<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wukong Dashboard - Aligned Side-by-Side</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --neon-red: #ff0044;
            --neon-yellow: #fff200;
            --neon-purple: #bc13fe;
            --bg-site: #0d1117;
            --card-bg: #161b22;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-site);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        /* WUKONG NOTIFICATION */
        #wukong-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95); border: 2px solid var(--neon-yellow);
            color: var(--neon-yellow); padding: 12px 35px; border-radius: 50px;
            font-size: 16px; font-weight: 900; text-transform: uppercase;
            box-shadow: 0 0 25px rgba(255, 242, 0, 0.5); z-index: 10000;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none;
        }
        #wukong-toast.show { top: 40px; }

        .main-wrapper { max-width: 1600px; margin: 0 auto; }

        .neon-title {
            font-size: 2.2rem; text-transform: uppercase; letter-spacing: 5px;
            color: #fff; text-shadow: 0 0 10px var(--neon-blue);
            text-align: center; margin-bottom: 20px;
            animation: floatingTitle 3s ease-in-out infinite;
        }
        @keyframes floatingTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* NAV AREA */
        .nav-area {
            display: flex; align-items: center; justify-content: flex-start;
            margin-bottom: 12px; gap: 15px;
        }
        .nav-menu { display: flex; gap: 6px; }
        .btn-nav {
            background: #21262d; color: white; border: 1px solid #30363d;
            padding: 6px 12px; cursor: pointer; font-weight: bold;
            border-radius: 5px; font-size: 10px; text-transform: uppercase;
        }
        .btn-nav.active { background: var(--neon-blue); color: black; box-shadow: 0 0 8px var(--neon-blue); }

        .official-links-toolbar { display: flex; gap: 8px; }
        .btn-link-quick {
            padding: 8px 15px; border-radius: 5px; font-size: 10px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; border: none; transition: 0.3s;
        }
        .btn-link-quick.merah { background: var(--neon-red); color: white; }
        .btn-link-quick.biru { background: var(--neon-blue); color: black; }

        /* TABLE SECTION */
        .table-section { background: var(--card-bg); border-radius: 8px; padding: 10px; border: 1px solid #30363d; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; } 
        th { color: var(--neon-blue); text-align: left; padding: 12px 8px; border-bottom: 2px solid #30363d; background: #0d1117; }
        td { padding: 8px 8px; border-bottom: 1px solid #21262d; }

        /* WARNA STATUS */
        .row-done { color: var(--neon-green) !important; text-shadow: 0 0 8px var(--neon-green); background: rgba(57, 255, 20, 0.05) !important; }
        .row-hokidraw-waiting { color: var(--neon-red) !important; background: rgba(255, 0, 68, 0.08) !important; animation: blinkRed 0.8s infinite alternate; font-weight: 900; }
        @keyframes blinkRed { from { text-shadow: 0 0 2px var(--neon-red); opacity: 1; } to { text-shadow: 0 0 15px var(--neon-red); opacity: 0.8; } }
        .row-next-up { color: var(--neon-blue) !important; background: rgba(0, 242, 255, 0.1) !important; animation: blinkBlue 1s infinite alternate; font-weight: 900; }
        @keyframes blinkBlue { from { text-shadow: 0 0 2px var(--neon-blue); opacity: 1; } to { text-shadow: 0 0 18px var(--neon-blue); opacity: 0.7; } }

        /* RIGHT SIDEBAR */
        .sticky-sidebar { position: sticky; top: 15px; display: flex; flex-direction: column; gap: 15px; }
        .clock-container { background: #000; border: 1px solid var(--neon-blue); border-radius: 8px; padding: 10px; text-align: center; }
        #digital-clock { color: var(--neon-blue); font-size: 20px; display: block; font-family: monospace; }

        /* HASIL RESULT SECTION - SIDE BY SIDE LAYOUT */
        .input-box-wrapper { 
            background: #000; 
            border: 2px solid var(--neon-blue); 
            padding: 15px 12px; 
            border-radius: 8px;
            display: flex; /* Aktifkan Flexbox */
            flex-direction: row; /* Arah Menyamping */
            align-items: center; /* Sejajar Vertikal */
            justify-content: space-between;
            gap: 15px;
        }

        .label-result-container {
            display: inline-block;
            border-bottom: 3px solid var(--neon-blue); /* Garis tebal table header */
            padding-bottom: 2px;
            flex-shrink: 0; /* Mencegah teks tertekuk */
            animation: floatingLabel 2s ease-in-out infinite;
        }

        @keyframes floatingLabel {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .label-text {
            color: var(--neon-blue); 
            font-size: 18px; /* Diperbesar agar kelihatan */
            font-weight: 900; 
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-blue);
            white-space: nowrap;
        }

        .main-input { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid #333; 
            color: var(--neon-yellow); 
            font-size: 14px; 
            flex-grow: 1; /* Mengisi sisa ruang */
            outline: none; 
            font-weight: 900; 
            padding: 10px;
            border-radius: 4px;
        }

        .post-section { background: var(--card-bg); border: 2px solid var(--neon-red); border-radius: 8px; padding: 12px; }
        .post-content { background: #000; color: #fff; padding: 10px; border-radius: 5px; height: 180px; font-family: monospace; font-size: 12px; overflow-y: auto; white-space: pre-wrap; border: 1px dashed #444; }
        .btn-copy { width: 100%; margin-top: 10px; background: var(--neon-green); color: black; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
    </style>
</head>

        let doneIDs = JSON.parse(localStorage.getItem('autoDoneIDs')) || [];
        let activeTab = "ALL";

        function updateClock() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();

            let lastResetHour = localStorage.getItem('lastHokiResetHour');
            if (m >= 50 && lastResetHour != h) {
                doneIDs = doneIDs.filter(id => id !== 1);
                localStorage.setItem('autoDoneIDs', JSON.stringify(doneIDs));
                localStorage.setItem('lastHokiResetHour', h);
                render();
            }

            document.getElementById('digital-clock').innerText = now.toLocaleTimeString();
            document.getElementById('digital-date').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'}).toUpperCase();
        }

        function autoProcess(val) {
            if(!val) return;
            const upper = val.toUpperCase();
            let matched = markets.find(m => upper.includes(m.nama.toUpperCase()));
            const nums = val.match(/\d{4}/g);

            if (matched && nums) {
                if (!doneIDs.includes(matched.id)) {
                    doneIDs.push(matched.id);
                    localStorage.setItem('autoDoneIDs', JSON.stringify(doneIDs));
                }
                document.getElementById('post-display').innerText = `Hasil Pengeluaran ${matched.nama}\nResult : ${nums[0]}\nSelamat JP!`;
                render();
            }
        }

        function render() {
            const tbody = document.getElementById('table-body');
            const filtered = activeTab === "ALL" ? markets : markets.filter(m => m.cat === activeTab || m.id === 1);
            const nextUpMarket = markets.find(m => m.id !== 1 && !doneIDs.includes(m.id));
            const nextUpID = nextUpMarket ? nextUpMarket.id : null;

            tbody.innerHTML = filtered.map(m => {
                let cls = "";
                if (doneIDs.includes(m.id)) cls = "row-done";
                else if (m.id === 1) cls = "row-hokidraw-waiting";
                else if (m.id === nextUpID) cls = "row-next-up";

                return `<tr class="${cls}">
                    <td>${m.id}</td>
                    <td style="font-weight:900;">${m.nama}</td>
                    <td>${m.jadwal}</td>
                    <td>${m.buka}</td>
                    <td>${m.tutup}</td>
                </tr>`;
            }).join('');
        }

        function quickCopy(url, label) {
            navigator.clipboard.writeText(url).then(() => wukongAlert(label + " COPIED!"));
        }

        function wukongAlert(msg) {
            const t = document.getElementById('wukong-toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function filterTab(tab, el) {
            activeTab = tab;
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            el.classList.add('active'); render();
        }

        function resetAll() {
            if(confirm("WUKONG: RESET SEMUA DATA?")) {
                localStorage.clear();
                doneIDs = []; render();
                wukongAlert("ALL DATA RESET");
            }
        }

        function copyPost() {
            const txt = document.getElementById('post-display').innerText;
            if(!txt) return;
            navigator.clipboard.writeText(txt).then(() => wukongAlert("WUKONG TELAH MENYALIN"));
        }

        setInterval(updateClock, 1000);
        window.onload = () => { updateClock(); render(); };
