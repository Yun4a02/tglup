<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --neon-red: #ff0044;
            --neon-yellow: #fff200;
            --neon-purple: #bc13fe;
            --bg-site: #0d1117;
            --card-bg: #161b22;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-site);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        /* WUKONG NOTIFICATION */
        #wukong-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95); border: 2px solid var(--neon-yellow);
            color: var(--neon-yellow); padding: 12px 35px; border-radius: 50px;
            font-size: 16px; font-weight: 900; text-transform: uppercase;
            box-shadow: 0 0 25px rgba(255, 242, 0, 0.5); z-index: 10000;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none;
        }
        #wukong-toast.show { top: 40px; }

        .main-wrapper { max-width: 1600px; margin: 0 auto; }

        .neon-title {
            font-size: 2.2rem; text-transform: uppercase; letter-spacing: 5px;
            color: #fff; text-shadow: 0 0 10px var(--neon-blue);
            text-align: center; margin-bottom: 5px;
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .marquee-wrapper {
            width: 100%; overflow: hidden; white-space: nowrap;
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            padding-bottom: 8px; margin-bottom: 20px;
        }
        .marquee-content {
            display: inline-block; color: var(--neon-yellow);
            font-size: 16px; text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-yellow);
            animation: walk 15s linear infinite; 
        }
        @keyframes walk { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 380px; gap: 15px; align-items: start; }

        .nav-area {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px; gap: 12px; width: 100%;
        }
        .nav-menu { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-nav {
            background: #21262d; color: white; border: 1px solid #30363d;
            padding: 6px 10px; cursor: pointer; font-weight: bold;
            border-radius: 5px; font-size: 9px; text-transform: uppercase; height: 32px;
        }
        .btn-nav.active { background: var(--neon-blue); color: black; box-shadow: 0 0 8px var(--neon-blue); }

        .quote-toolbar-wrapper {
            width: 400px; display: flex; align-items: center;
            background: rgba(0, 0, 0, 0.4); border: 1px solid #444;
            padding: 0 10px; border-radius: 5px; height: 32px;
        }
        .label-quote-sm { color: var(--neon-yellow); font-size: 9px; white-space: nowrap; margin-right: 8px; }
        .input-quote-sm { background: transparent; border: none; color: white; font-size: 10px; outline: none; width: 100%; }
        .btn-reset { background: #30363d; color: #ff4757; border: none; padding: 0 15px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 9px; text-transform: uppercase; height: 32px; }

        .sticky-sidebar { position: sticky; top: 15px; display: flex; flex-direction: column; gap: 15px; }

        .clock-container {
            background: rgba(0, 0, 0, 0.3); border: 1px solid #30363d;
            border-radius: 8px; padding: 8px; text-align: center;
        }
        #digital-clock { color: var(--neon-blue); font-size: 16px; text-shadow: 0 0 8px var(--neon-blue); display: block; }
        #digital-date { color: #8b949e; font-size: 10px; text-transform: uppercase; }

        .input-box-wrapper {
            background: rgba(0, 0, 0, 0.4); border: 2px solid var(--neon-blue);
            padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 10px;
        }
        .label-input { color: var(--neon-blue); font-size: 10px; white-space: nowrap; }
        .main-input { background: transparent; border: none; color: var(--neon-yellow); font-size: 13px; font-weight: 900; outline: none; width: 100%; }

        .post-section { background: var(--card-bg); border: 2px solid var(--neon-red); border-radius: 8px; padding: 12px; }
        .post-content {
            background: #000; color: #fff; padding: 12px; border-radius: 5px;
            font-family: 'Courier New', monospace; font-size: 12px;
            white-space: pre-wrap; border: 1px dashed #444; line-height: 1.5; 
            height: 220px; width: 100%; box-sizing: border-box; text-align: left; overflow-y: auto;
        }
        .btn-copy { width: 100%; margin-top: 12px; background: var(--neon-green); color: black; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }

        .sweep-section { background: var(--card-bg); border: 2px solid var(--neon-purple); border-radius: 8px; padding: 12px; }
        .sweep-title { color: var(--neon-purple); font-size: 11px; margin-bottom: 8px; text-align: center; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .sweep-paste-box { width: 100%; background: #000; border: 1px solid var(--neon-purple); color: var(--neon-yellow); padding: 10px; border-radius: 5px; font-size: 12px; outline: none; margin-bottom: 12px; box-sizing: border-box; text-align: center; font-weight: 900; }
        .sweep-preview-container { display: flex; justify-content: center; align-items: center; margin-bottom: 12px; }
        .ball-group { display: flex; gap: 5px; }
        .ball-sm { width: 35px; background: #222; border: 1px solid #444; color: var(--neon-yellow); font-size: 12px; text-align: center; padding: 6px 0; border-radius: 4px; }
        .ball-add { margin-left: 15px; width: 40px; border: 1px solid var(--neon-blue); color: var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        .sweep-result-box { background: #000; border: 2px solid var(--neon-green); padding: 10px; text-align: center; border-radius: 5px; }
        .sweep-4d { font-size: 32px; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); letter-spacing: 8px; font-weight: 900; }

        .table-section { background: var(--card-bg); border-radius: 10px; padding: 10px; border: 1px solid #30363d; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; } 
        th { color: var(--neon-blue); text-align: left; padding: 12px 10px; border-bottom: 2px solid #30363d; background: #0d1117; }
        td { padding: 4px 6px; border-bottom: 1px solid #21262d; }

        /* STATUSES */
        .row-done { color: var(--neon-green) !important; text-shadow: 0 0 10px var(--neon-green) !important; background: rgba(57, 255, 20, 0.04) !important; }
        .row-next-up { color: #fff !important; background: rgba(0, 242, 255, 0.12) !important; animation: blinkBlueNeon 0.7s infinite alternate !important; }
        @keyframes blinkBlueNeon { from { text-shadow: 0 0 3px var(--neon-blue); } to { text-shadow: 0 0 15px var(--neon-blue); color: var(--neon-blue); } }
        
        /* HOKIDRAW FIX (MERAH KEDIP) */
        .row-hokidraw { 
            color: var(--neon-red) !important; 
            animation: blinkRedNeon 0.8s infinite alternate !important; 
            background: rgba(255, 0, 68, 0.05) !important;
        }
        @keyframes blinkRedNeon { from { text-shadow: 0 0 3px var(--neon-red); } to { text-shadow: 0 0 15px var(--neon-red); } }
    </style>
</head>

        // FUNGSI UPDATE JAM DAN RESET HOKIDRAW
        function updateClock() {
            const now = new Date();
            const mins = now.getMinutes();

            // PAKSA RESET HOKIDRAW (ID 1) JIKA MENIT >= 50
            if (mins >= 50 && doneIDs.includes(1)) {
                doneIDs = doneIDs.filter(id => id !== 1);

                render(); // Trigger pembaruan tampilan ke merah

            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('digital-clock').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ampm}`;

        function smartCalcSweep(val) {
            const nums = val.match(/\d+/g); 
            if (!nums || nums.length < 7) return;
            const b = nums.slice(0, 6).map(n => parseInt(n));
            const add = parseInt(nums[6]);
            for(let i=0; i<6; i++) document.getElementById(`pv-b${i+1}`).innerText = b[i].toString().padStart(2, '0');
            document.getElementById('pv-add').innerText = add.toString().padStart(2, '0');
            const digit1 = (b[1] + b[2]).toString().slice(-1);
            const digit2 = (b[3] + b[4]).toString().slice(-1);
            const sumB = b.reduce((a, b) => a + b, 0);
            const step4 = (sumB * 2) - b[0] - b[5] + add;
            const lastTwo = step4.toString().slice(-2).padStart(2, '0');
            document.getElementById('sweep-output').innerText = digit1 + digit2 + lastTwo;
        }

        function updateQuote(v) {
            localStorage.setItem('permanentQuote', v);
            document.getElementById('quote-display').innerText = v || "SILAHKAN ISI QUOTES ANDA...";
        }

        function getShio(num) {
            let tail = num.slice(-2);
            for(let key in shioTable) if(shioTable[key].includes(tail)) return key;
            return "...";
        }

        function autoProcess(val) {
            if(!val) { document.getElementById('post-display').innerText = ""; return; }
            const upper = val.toUpperCase();
            let marketSearch = "";
            if (upper.includes("PASAR :")) {
                marketSearch = upper.split("PASAR :")[1].trim().split(" ")[0] + (upper.split("PASAR :")[1].trim().split(" ")[1] || "");
            } else { marketSearch = upper.split(/\s+/)[0]; }

            const cleanSearch = marketSearch.replace(/\s/g, '');
            let matched = markets.find(m => m.nama.replace(/\s/g, '').includes(cleanSearch));
            const nums = val.match(/\d{4}/g) || [];

            if(matched && nums.length > 0) {
                // Jangan biarkan Hokidraw jadi hijau jika sudah masuk waktu reset
                if (matched.id === 1 && new Date().getMinutes() >= 50) {
                    wukongAlert("HOKIDRAW MASUK WAKTU RESET!");
                } else {
                    if(!doneIDs.includes(matched.id)) {
                        doneIDs.push(matched.id);
                        localStorage.setItem('autoDoneIDs', JSON.stringify(doneIDs));
                    }
                }
                const now = new Date();
                const daysStr = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUM'AT", "SABTU"];
                const dateStr = `${now.getDate()} March ${now.getFullYear()}`;
                let post = `Hasil Pengeluaran ${matched.nama}\nHari Ini ${daysStr[now.getDay()]}, ${dateStr}\n`;
                if(nums.length === 1) post += `Result : ${nums[0]}\nSHIO : ${getShio(nums[0])}`;
                else post += `Prize 1 : ${nums[0]}, SHIO : ${getShio(nums[0])}\nPrize 2 : ${nums[1] || '----'}\nPrize 3 : ${nums[2] || '----'}`;
                post += `\nSelamat Kepada Pemenang, Salam JP Hanya di TogelUP`;
                document.getElementById('post-display').innerText = post;
                render();
            }
        }

        function render() {
            const tbody = document.getElementById('table-body');
            const filtered = activeTab === "ALL" ? markets : markets.filter(m => m.cat === activeTab || m.id === 1);
            const nextUpID = markets.find(m => m.id !== 1 && !doneIDs.includes(m.id))?.id;
            tbody.innerHTML = filtered.map((m) => {
                let cls = doneIDs.includes(m.id) ? "row-done" : (m.id === 1 ? "row-hokidraw" : (m.id === nextUpID ? "row-next-up" : ""));
                return `<tr class="${cls}"><td>${m.id}</td><td style="font-weight:900;">${m.nama}</td><td>${m.jadwal}</td><td>${m.buka}</td><td>${m.tutup}</td></tr>`;
            }).join('');
        }

        function filterTab(tab, el) {
            activeTab = tab;
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function resetAll() {
            localStorage.removeItem('autoDoneIDs');
            doneIDs = []; 
            document.getElementById('main-input').value = ""; 
            document.getElementById('post-display').innerText = "";
            render(); 
            wukongAlert("WUKONG RESET DATA ALL");
        }

        function copyPost() {
            const txt = document.getElementById('post-display').innerText;
            if(!txt) return;
            navigator.clipboard.writeText(txt).then(() => wukongAlert("WUKONG TELAH MENYALIN"));
        }

        document.getElementById('quote-input').value = localStorage.getItem('permanentQuote') || "";
        document.getElementById('quote-display').innerText = localStorage.getItem('permanentQuote') || "SILAHKAN ISI QUOTES ANDA...";
        render();
    </script>
</body>
</html>
