<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wukong Dashboard - Aligned Links</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --neon-red: #ff0044;
            --neon-yellow: #fff200;
            --neon-purple: #bc13fe;
            --bg-site: #0d1117;
            --card-bg: #161b22;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-site);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        /* WUKONG NOTIFICATION */
        #wukong-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95); border: 2px solid var(--neon-yellow);
            color: var(--neon-yellow); padding: 12px 35px; border-radius: 50px;
            font-size: 16px; font-weight: 900; text-transform: uppercase;
            box-shadow: 0 0 25px rgba(255, 242, 0, 0.5); z-index: 10000;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none;
        }
        #wukong-toast.show { top: 40px; }

        .main-wrapper { max-width: 1600px; margin: 0 auto; }

        .neon-title {
            font-size: 2.2rem; text-transform: uppercase; letter-spacing: 5px;
            color: #fff; text-shadow: 0 0 10px var(--neon-blue);
            text-align: center; margin-bottom: 5px;
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* NAV AREA DENGAN OFFICIAL LINKS */
        .nav-area {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px; gap: 12px; width: 100%;
        }
        .nav-menu { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-nav {
            background: #21262d; color: white; border: 1px solid #30363d;
            padding: 6px 10px; cursor: pointer; font-weight: bold;
            border-radius: 5px; font-size: 9px; text-transform: uppercase; height: 32px;
        }
        .btn-nav.active { background: var(--neon-blue); color: black; box-shadow: 0 0 8px var(--neon-blue); }

        /* AREA BARU (KOTAK MERAH) */
        .official-links-toolbar {
            display: flex;
            gap: 8px;
            flex-grow: 1;
            justify-content: center; /* Membuat link berada di tengah antara menu dan quotes */
        }
        .btn-link-quick {
            padding: 6px 15px;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            height: 32px;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }
        .btn-link-quick.merah { background: var(--neon-red); color: white; box-shadow: 0 0 10px rgba(255, 0, 68, 0.3); }
        .btn-link-quick.biru { background: var(--neon-blue); color: black; box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
        .btn-link-quick:hover { transform: translateY(-2px); filter: brightness(1.2); }

        .quote-toolbar-wrapper {
            width: 400px; display: flex; align-items: center;
            background: rgba(0, 0, 0, 0.4); border: 1px solid #444;
            padding: 0 10px; border-radius: 5px; height: 32px;
        }
        .label-quote-sm { color: var(--neon-yellow); font-size: 9px; white-space: nowrap; margin-right: 8px; }
        .input-quote-sm { background: transparent; border: none; color: white; font-size: 10px; outline: none; width: 100%; font-weight: bold;}
        
        .btn-reset { background: #30363d; color: #ff4757; border: none; padding: 0 15px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 9px; text-transform: uppercase; height: 32px; }

        /* GRID LAYOUT */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 380px; gap: 15px; align-items: start; }

        /* TABLE */
        .table-section { background: var(--card-bg); border-radius: 8px; padding: 8px; border: 1px solid #30363d; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; } 
        th { color: var(--neon-blue); text-align: left; padding: 10px 6px; border-bottom: 2px solid #30363d; background: #0d1117; text-transform: uppercase; font-size: 11px;}
        td { padding: 8px 6px; border-bottom: 1px solid #21262d; font-weight: 800; }
        .pasaran-name { color: var(--neon-green); text-shadow: 0 0 5px rgba(57, 255, 20, 0.2); }

        /* SIDEBAR COMPONENTS */
        .clock-container { background: rgba(0, 0, 0, 0.3); border: 1px solid #30363d; border-radius: 8px; padding: 8px; text-align: center; margin-bottom: 15px;}
        #digital-clock { color: var(--neon-blue); font-size: 18px; text-shadow: 0 0 8px var(--neon-blue); display: block; font-family: 'Orbitron';}
        #digital-date { color: #8b949e; font-size: 10px; text-transform: uppercase; }

        /* INPUT BOX */
        .input-box-wrapper { background: rgba(0, 0, 0, 0.4); border: 2px solid var(--neon-blue); padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 10px; margin-bottom: 15px;}
        .main-input { background: transparent; border: none; color: var(--neon-yellow); font-size: 13px; font-weight: 900; outline: none; width: 100%; }

        /* POST SECTION */
        .post-section { background: var(--card-bg); border: 2px solid var(--neon-red); border-radius: 8px; padding: 12px; margin-bottom: 15px;}
        .post-content { background: #000; color: #fff; padding: 12px; border-radius: 5px; font-family: 'Courier New', monospace; font-size: 12px; white-space: pre-wrap; border: 1px dashed #444; height: 200px; overflow-y: auto; text-align: left;}
        .btn-copy { width: 100%; margin-top: 10px; background: var(--neon-green); color: black; border: none; padding: 12px; border-radius: 5px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; font-size: 11px; }

        /* ROW STATUS */
        .row-done { color: var(--neon-green) !important; background: rgba(57, 255, 20, 0.05) !important; }
        .row-next-up { animation: blinkBlue 1s infinite alternate; }
        @keyframes blinkBlue { from { background: transparent; } to { background: rgba(0, 242, 255, 0.1); } }

    </style>
</head>
<body>

    <div id="wukong-toast">WUKONG NOTIFICATION</div>

    <div class="main-wrapper">
        <h1 class="neon-title">ANGKA RESULT</h1>

        <div class="nav-area">
            <!-- GROUP 1: FILTER -->
            <div class="nav-menu">
                <button class="btn-nav active" onclick="filterTab('ALL', this)">ALL PASARAN</button>
                <button class="btn-nav" onclick="filterTab('PAGI', this)">PAGI</button>
                <button class="btn-nav" onclick="filterTab('SORE', this)">SORE</button>
                <button class="btn-nav" onclick="filterTab('MALAM', this)">MALAM</button>
            </div>

            <!-- GROUP 2: AREA LINK (KOTAK MERAH ANDA) -->
            <div class="official-links-toolbar">
                <button class="btn-link-quick merah" onclick="quickCopy('https://w6.ceriawlatogel88.net/wap', 'LINK MERAH')">LINK MERAH</button>
                <button class="btn-link-quick biru" onclick="quickCopy('https://www.vegastogel.net/wap', 'LINK BIRU')">LINK BIRU</button>
            </div>

            <!-- GROUP 3: QUOTES -->
            <div class="quote-toolbar-wrapper">
                <span class="label-quote-sm">FORMAT QUOTES :</span>
                <input type="text" id="quote-input" class="input-quote-sm" value="TERUS LAH BERJUANG MESKIPUN TIDAK BERGUNA">
            </div>

            <!-- GROUP 4: RESET -->
            <button class="btn-reset" onclick="resetAll()">RESET ALL</button>
        </div>

        <div class="dashboard-grid">
            <div class="left-col">
                <div class="table-section">
                    <table>
                        <thead>
                            <tr><th>NO</th><th>NAMA PASARAN</th><th>JADWAL</th><th>BUKA</th><th>TUTUP</th></tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Data pasaran akan diisi oleh JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="right-col">
                <div class="clock-container">
                    <span id="digital-clock">00:00:00 AM</span>
                    <span id="digital-date">SENIN, 16 MARCH 2026</span>
                </div>
                
                <div class="input-box-wrapper">
                    <span style="color:var(--neon-blue); font-size:10px;">RESULT :</span>
                    <input type="text" id="main-input" class="main-input" placeholder="Tempel Periode & Pasar di sini..." oninput="autoProcess(this.value)">
                </div>

                <div class="post-section">
                    <div style="color:var(--neon-red); margin-bottom:8px; font-size: 11px; font-weight: 900;">FORMAT POSTINGAN:</div>
                    <div class="post-content" id="post-display"></div>
                    <button class="btn-copy" onclick="copyPost()">SALIN & POST RESULT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const markets = [
            { id: 1, nama: "HOKIDRAW", jadwal: "SENIN - MINGGU", buka: "RESULT 24 KALI", tutup: "1 JAM SEKALI", cat: "MALAM" },
            { id: 2, nama: "TOTO MACAU 4D PAGI", jadwal: "SENIN - MINGGU", buka: "00:00 WIB", tutup: "00:15 WIB", cat: "MALAM" },
            { id: 3, nama: "KENTUCKYMID", jadwal: "SENIN - MINGGU", buka: "00:05 WIB", tutup: "00:20 WIB", cat: "MALAM" },
            { id: 4, nama: "BANGKOK 0130", jadwal: "SENIN - MINGGU", buka: "01:15 WIB", tutup: "01:30 WIB", cat: "MALAM" },
            { id: 5, nama: "CAROLINADAY", jadwal: "SENIN - MINGGU", buka: "01:45 WIB", tutup: "02:00 WIB", cat: "MALAM" }
            // ... tambahkan pasaran lainnya di sini
        ];

        function quickCopy(url, label) {
            navigator.clipboard.writeText(url).then(() => {
                wukongAlert("WUKONG: " + label + " COPIED!");
            });
        }

        function wukongAlert(msg) {
            const t = document.getElementById('wukong-toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function updateClock() {
            const now = new Date();
            const days = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUM'AT", "SABTU"];
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('digital-clock').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ampm}`;
            document.getElementById('digital-date').innerText = `${days[now.getDay()]}, ${now.getDate()} MARCH ${now.getFullYear()}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = markets.map(m => `
                <tr>
                    <td style="color:var(--neon-green)">${m.id}</td>
                    <td class="pasaran-name">${m.nama}</td>
                    <td style="color:var(--neon-green)">${m.jadwal}</td>
                    <td>${m.buka}</td>
                    <td style="color:var(--neon-green)">${m.tutup}</td>
                </tr>
            `).join('');
        }

        function resetAll() {
            document.getElementById('main-input').value = "";
            document.getElementById('post-display').innerText = "";
            wukongAlert("WUKONG: ALL DATA RESET");
        }

        window.onload = renderTable;
    </script>
</body>
</html>
