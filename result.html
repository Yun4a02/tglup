<!DOCTYPE html>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --neon-red: #ff0044;
            --neon-yellow: #fff200;
            --neon-purple: #bc13fe;
            --neon-glow: rgba(0, 251, 255, 0.5);
            --bg-site: #000c14;
            --card-bg: #00121a;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-site);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            margin: 0;
            padding: 15px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* NOTIFIKASI */
        #wukong-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95); border: 2px solid var(--neon-yellow);
            color: var(--neon-yellow); padding: 12px 35px; border-radius: 50px;
            font-size: 14px; font-weight: 900; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 242, 0, 0.5); z-index: 10000;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #wukong-toast.show { top: 30px; }

        .neon-title {
            font-size: 1.8rem; text-transform: uppercase; letter-spacing: 5px;
            color: #fff; text-shadow: 0 0 10px var(--neon-blue);
            text-align: center; margin-bottom: 15px;
        }

        /* NAV AREA */
        .nav-area {
            display: flex; align-items: center; gap: 15px;
            margin-bottom: 15px; background: rgba(0,0,0,0.3);
            padding: 10px; border-radius: 8px;
        }
        .nav-menu { display: flex; gap: 6px; }
        .btn-nav {
            background: #21262d; color: white; border: 1px solid #30363d;
            padding: 6px 12px; cursor: pointer; font-weight: bold;
            border-radius: 5px; font-size: 10px; text-transform: uppercase;
        }
        .btn-nav.active { background: var(--neon-blue); color: black; box-shadow: 0 0 8px var(--neon-blue); }

        .official-links-toolbar { display: flex; gap: 8px; }
        .btn-link-quick {
            padding: 8px 15px; border-radius: 5px; font-size: 10px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; border: none;
        }
        .btn-link-quick.merah { background: var(--neon-red); color: white; }
        .btn-link-quick.biru { background: var(--neon-blue); color: black; }

        /* MAIN GRID */
        .main-container-grid {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        /* TABEL AREA */
        .table-section {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; } 
        th { color: var(--neon-blue); text-align: left; padding: 12px 8px; border-bottom: 2px solid #30363d; background: #0d1117; position: sticky; top: 0; z-index: 10; }
        td { padding: 8px 8px; border-bottom: 1px solid #21262d; }

        /* WARNA STATUS */
        .row-done { color: var(--neon-green) !important; text-shadow: 0 0 8px var(--neon-green); background: rgba(57, 255, 20, 0.05) !important; }
        .row-hokidraw-waiting { color: var(--neon-red) !important; animation: blinkRed 0.8s infinite alternate; font-weight: 900; }
        @keyframes blinkRed { from { text-shadow: 0 0 2px var(--neon-red); opacity: 1; } to { text-shadow: 0 0 15px var(--neon-red); opacity: 0.8; } }
        .row-next-up { color: var(--neon-blue) !important; background: rgba(0, 242, 255, 0.1) !important; animation: blinkBlue 1s infinite alternate; font-weight: 900; }
        @keyframes blinkBlue { from { text-shadow: 0 0 2px var(--neon-blue); opacity: 1; } to { text-shadow: 0 0 18px var(--neon-blue); opacity: 0.7; } }

        /* SIDEBAR AREA */
        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 5px; }

        .clock-box { background: #000; border: 1px solid var(--neon-blue); border-radius: 8px; padding: 10px; text-align: center; }
        #digital-clock { color: var(--neon-blue); font-size: 20px; display: block; font-family: monospace; }

        .result-input-card { background: #000; border: 2px solid var(--neon-blue); padding: 12px; border-radius: 8px; }
        .label-float { 
            display: inline-block; border-bottom: 3px solid var(--neon-blue); 
            margin-bottom: 8px; animation: floatingLabel 2s ease-in-out infinite;
        }
        @keyframes floatingLabel { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .label-text { color: var(--neon-blue); font-size: 15px; font-weight: 900; text-transform: uppercase; }

        .main-input-field { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #333; color: var(--neon-yellow); padding: 10px; border-radius: 5px; outline: none; font-size: 13px; font-weight: 900; }

        /* POST CARD - TINGGI DISESUAIKAN GARIS MERAH */
        .post-card { background: var(--card-bg); border: 2px solid var(--neon-red); border-radius: 8px; padding: 12px; }
        .post-display-box { 
            background: #000; color: #fff; padding: 10px; border-radius: 5px;

        }
        .btn-post-copy { width: 100%; margin-top: 8px; background: var(--neon-green); color: black; border: none; padding: 10px; border-radius: 5px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; }

        /* SINGAPORE SWEEP CALCULATOR */
        .sweep-card { background: var(--card-bg); border: 2px solid var(--neon-purple); border-radius: 8px; padding: 12px; }
        .sweep-title { color: var(--neon-purple); font-size: 11px; margin-bottom: 8px; text-align: center; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .sweep-input { width: 100%; background: #000; border: 1px solid var(--neon-purple); color: var(--neon-yellow); padding: 8px; border-radius: 5px; font-size: 12px; outline: none; margin-bottom: 10px; text-align: center; font-weight: 900; }
        .ball-container { display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        .ball-sm { width: 32px; height: 32px; background: #222; border: 1px solid #444; color: var(--neon-yellow); font-size: 11px; display: flex; align-items: center; justify-content: center; border-radius: 4px; margin: 0 2px; }
        .ball-add { margin-left: 15px; border: 1px solid var(--neon-blue); color: var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        .sweep-res-box { background: #000; border: 2px solid var(--neon-green); padding: 8px; text-align: center; border-radius: 5px; }
        .sweep-4d-out { font-size: 26px; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); letter-spacing: 5px; font-weight: 900; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
    </style>
</head>

                    let post = `Hasil Pengeluaran ${matched.nama}\n`;
                    post += `Hari Ini ${dayStr} , ${dateStr}\n`;
                    if (nums.length >= 3) {
                        post += `Prize 1 : ${nums[0]}, SHIO : ${getShio(nums[0])}\nPrize 2 : ${nums[1]}\nPrize 3 : ${nums[2]}\n`;
                    } else {
                        post += `Result : ${nums[0]}\nSHIO : ${getShio(nums[0])}\n`;
                    }
                    post += `Selamat Kepada Pemenang, Salam JP Hanya di TogelUP`;
                    display.innerText = post;
                    render();
                }
            }
        }

        function render() {
            const tbody = document.getElementById('table-body');
            const filtered = activeTab === "ALL" ? markets : markets.filter(m => m.cat === activeTab || m.id === 1);
            const nextUpMarket = markets.find(m => m.id !== 1 && !doneIDs.includes(m.id));
            const nextUpID = nextUpMarket ? nextUpMarket.id : null;
            tbody.innerHTML = filtered.map(m => {
                let cls = "";
                if (doneIDs.includes(m.id)) cls = "row-done";
                else if (m.id === 1) cls = "row-hokidraw-waiting";
                else if (m.id === nextUpID) cls = "row-next-up";
                return `<tr class="${cls}"><td>${m.id}</td><td style="font-weight:900;">${m.nama}</td><td>${m.jadwal}</td><td>${m.buka}</td><td>${m.tutup}</td></tr>`;
            }).join('');
        }

        function quickCopy(url, label) { navigator.clipboard.writeText(url).then(() => wukongAlert(label + " COPIED!")); }
        function wukongAlert(msg) { const t = document.getElementById('wukong-toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function filterTab(tab, el) { activeTab = tab; document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active')); el.classList.add('active'); render(); }
        function resetAll() { if(confirm("RESET SEMUA DATA?")) { localStorage.clear(); doneIDs = []; render(); document.getElementById('main-input').value = ""; document.getElementById('post-display').innerText = ""; wukongAlert("ALL DATA RESET"); } }
        function copyPost() { const txt = document.getElementById('post-display').innerText; if(!txt) return; navigator.clipboard.writeText(txt).then(() => wukongAlert("TELAH MENYALIN")); }

        setInterval(updateClock, 1000);
        window.onload = () => { updateClock(); render(); };
    </script>
</body>
</html>
