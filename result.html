<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wukong Result Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --neon-red: #ff0044;
            --neon-yellow: #fff200;
            --bg-site: #0d1117;
            --card-bg: #161b22;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-site);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* WUKONG POPUP NOTIFICATION */
        #wukong-toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--neon-yellow);
            color: var(--neon-yellow);
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 242, 0, 0.6);
            z-index: 10000;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        #wukong-toast.show { top: 50px; }

        .main-wrapper { max-width: 1650px; margin: 0 auto; }

        .neon-title {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue);
            text-align: center;
            margin-bottom: 10px;
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .marquee-wrapper {
            width: 100%; max-width: 900px; margin: 0 auto 20px auto;
            overflow: hidden; white-space: nowrap;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2); padding-bottom: 5px;
        }

        .marquee-content {
            display: inline-block; color: var(--neon-yellow);
            font-size: 14px; text-transform: uppercase;
            text-shadow: 0 0 5px var(--neon-yellow);
            animation: walk 20s linear infinite;
        }

        @keyframes walk {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            align-items: start;
        }

        .nav-area { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .nav-menu { display: flex; gap: 8px; }
        .btn-nav {
            background: #21262d; color: white; border: 1px solid #30363d;
            padding: 8px 15px; cursor: pointer; font-weight: bold;
            border-radius: 6px; font-size: 11px; text-transform: uppercase;
        }
        .btn-nav.active { background: var(--neon-blue); color: black; box-shadow: 0 0 10px var(--neon-blue); }
        .btn-reset { background: #30363d; color: #ff4757; border: none; padding: 8px 15px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 11px; text-transform: uppercase; }

        .sticky-sidebar { position: sticky; top: 20px; }

        .clock-container {
            background: rgba(0, 0, 0, 0.3); border: 1px solid #30363d;
            border-radius: 10px; padding: 10px; text-align: center; margin-bottom: 15px;
        }
        #digital-clock { color: var(--neon-blue); font-size: 18px; text-shadow: 0 0 10px var(--neon-blue); display: block; }
        #digital-date { color: #8b949e; font-size: 11px; text-transform: uppercase; }

        .input-box-wrapper {
            background: rgba(0, 0, 0, 0.4); border: 2px solid var(--neon-blue);
            padding: 10px 15px; border-radius: 10px; display: flex;
            align-items: center; gap: 10px; margin-bottom: 15px;
        }
        .label-input { color: var(--neon-blue); font-size: 11px; white-space: nowrap; }
        .main-input {
            background: transparent; border: none; color: var(--neon-yellow);
            font-size: 14px; font-weight: 900; outline: none; width: 100%;
        }

        .post-section { background: var(--card-bg); border: 2px solid var(--neon-red); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .post-content {
            background: #000; color: #fff; padding: 15px; border-radius: 6px;
            font-family: 'Courier New', monospace; font-size: 13px;
            white-space: pre-wrap; border: 1px dashed #444; line-height: 1.5; min-height: 250px;
        }
        .btn-copy {
            width: 100%; margin-top: 15px; background: var(--neon-green);
            color: black; border: none; padding: 12px; border-radius: 6px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        .quote-input-panel { background: #1c2128; border: 1px solid #444; padding: 15px; border-radius: 10px; }
        .label-quote { color: var(--neon-yellow); font-size: 12px; margin-bottom: 8px; display: block; }
        .input-quote {
            width: 100%; background: #000; border: 1px solid #333; color: white;
            padding: 10px; border-radius: 5px; outline: none; font-size: 12px; box-sizing: border-box;
        }

        .table-section { background: var(--card-bg); border-radius: 10px; padding: 10px; border: 1px solid #30363d; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { color: var(--neon-blue); text-align: left; padding: 12px 8px; border-bottom: 2px solid #30363d; background: #0d1117; }
        td { padding: 6px 8px; border-bottom: 1px solid #21262d; }

        .row-done { color: var(--neon-green) !important; text-shadow: 0 0 8px var(--neon-green); background: rgba(57, 255, 20, 0.05); }
        .row-hokidraw { color: var(--neon-red); animation: blink 1s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.4; } }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

        <h1 class="neon-title">ANGKA RESULT</h1>

                <div class="table-section">

            <!-- KANAN -->

                <div class="input-box-wrapper">

                </div>
                <div class="post-section">
                    <div style="color:var(--neon-red); margin-bottom:10px; font-size: 12px;">FORMAT POSTINGAN:</div>
                    <div class="post-content" id="post-display">Menunggu input...</div>

                </div>
                <div class="quote-input-panel">

                </div>
            </div>
        </div>

        // FUNCTION WUKONG NOTIFICATION
        function wukongAlert(msg) {
            const toast = document.getElementById('wukong-toast');
            toast.innerText = msg;
            toast.classList.add('show');

        function updateClock() {
            const now = new Date();
            const days = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUM'AT", "SABTU"];
            const months = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('digital-clock').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ampm}`;
            document.getElementById('digital-date').innerText = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
        }
        setInterval(updateClock, 1000); updateClock();

        function updateQuote(val) {
            localStorage.setItem('permanentQuote', val);
            document.getElementById('quote-display').innerText = val || "SILAHKAN ISI QUOTES ANDA...";

        function getShio(num) {
            let tail = num.slice(-2);
            for(let key in shioTable) if(shioTable[key].includes(tail)) return key;
            return "...";
        }

        function autoProcess(val) {
            localStorage.setItem('lastInputText', val);
            if(!val) return;
            const upper = val.toUpperCase();
            const nums = val.match(/\d{4}/g) || [];
            let matched = markets.find(m => upper.includes(m.nama.split(' ')[0]));

            if(matched && nums.length > 0) {
                if(!doneIDs.includes(matched.id)) {
                    doneIDs.push(matched.id);
                    localStorage.setItem('autoDoneIDs', JSON.stringify(doneIDs));
                    render();
                }
                const now = new Date();
                const dateStr = `14 March 2026`; 
                let post = `Hasil Pengeluaran ${matched.nama}\nHari Ini SABTU, ${dateStr}\n`;
                if(nums.length === 1) post += `Result : ${nums[0]}\nSHIO : ${getShio(nums[0])}`;
                else post += `Prize 1 : ${nums[0]}, SHIO : ${getShio(nums[0])}\nPrize 2 : ${nums[1] || '----'}\nPrize 3 : ${nums[2] || '----'}`;
                post += `\nSelamat Kepada Pemenang, Salam JP Hanya di TogelUP`;
                document.getElementById('post-display').innerText = post;
                localStorage.setItem('lastPostContent', post);
            }
        }

        function render() {
            const tbody = document.getElementById('table-body');
            const filtered = activeTab === "ALL" ? markets : markets.filter(m => m.cat === activeTab || m.id === 1);
            tbody.innerHTML = filtered.map((m) => {
                let cls = doneIDs.includes(m.id) ? "row-done" : (m.id === 1 ? "row-hokidraw" : "");
                return `<tr class="${cls}"><td>${m.id}</td><td style="font-weight:900;">${m.nama}</td><td>${m.jadwal}</td><td>${m.buka}</td><td>${m.tutup}</td></tr>`;
            }).join('');
        }

        function filterTab(tab, el) {
            activeTab = tab;
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function resetAll() {
            localStorage.removeItem('autoDoneIDs');
            localStorage.removeItem('lastInputText');
            localStorage.removeItem('lastPostContent');
            doneIDs = [];
            document.getElementById('main-input').value = "";
            document.getElementById('post-display').innerText = "Menunggu input...";
            render();
            wukongAlert("WUKONG RESET DATA ALL");
        }

        function copyPost() {
            const txt = document.getElementById('post-display').innerText;
            if(txt.includes("Menunggu")) return;
            navigator.clipboard.writeText(txt).then(() => {
                wukongAlert("WUKONG TELAH MENYALIN");
            });
        }

        const savedQuote = localStorage.getItem('permanentQuote') || "";
        document.getElementById('quote-input').value = savedQuote;
        document.getElementById('quote-display').innerText = savedQuote || "SILAHKAN ISI QUOTES ANDA...";
        document.getElementById('main-input').value = localStorage.getItem('lastInputText') || "";
        document.getElementById('post-display').innerText = localStorage.getItem('lastPostContent') || "Menunggu input...";
        render();
    </script>
</body>
</html>
