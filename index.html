<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Postingan UP</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/pDQOisi.png">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #000c14;
            --sidebar-bg: #00121a;
            --neon-aqua: #00fbff;
            --neon-glow: rgba(0, 251, 255, 0.5);
            --glass-white: rgba(255, 255, 255, 0.05);
            --glass-hover: rgba(0, 251, 255, 0.12);
            --text-main: #e0e6ed; /* Warna teks lebih terang agar jelas */
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 290px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(0, 251, 255, 0.2);
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.8);
        }

        .header-title {
            width: 100%;
            padding: 40px 20px 25px 20px;
            text-align: center;
        }

        .dashboard-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 19px;
            font-weight: 700;
            color: var(--neon-aqua);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            line-height: 1.4;
            text-shadow: 0 0 15px var(--neon-glow);
            border-bottom: 2px solid var(--neon-glow);
            padding-bottom: 12px;
            display: inline-block;
        }

        /* --- MENU CONTAINER --- */
        .menu-container {
            list-style: none;
            padding: 10px 15px;
            margin-top: 10px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .menu-item {
            margin-bottom: 10px;
            position: relative;
        }

        /* Styling Menu Utama (Parent) */
        .menu-link {
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            padding: 15px 18px;
            border-radius: 12px;
            font-weight: 700; /* Font Tebal */
            font-size: 15px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            background: var(--glass-white);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition);
            cursor: pointer;
            user-select: none;
        }

        .menu-link:hover {
            color: #fff;
            background: var(--glass-hover);
            border-color: var(--neon-aqua);
            transform: translateX(8px);
            box-shadow: 0 0 20px rgba(0, 251, 255, 0.15);
        }

        .menu-link.active {
            color: #fff;
            background: rgba(0, 251, 255, 0.15);
            border-color: var(--neon-aqua);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5); /* Glow pada teks aktif */
        }

        .menu-link .icon {
            margin-right: 14px;
            font-size: 20px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        .arrow {
            margin-left: auto;
            font-size: 11px;
            font-weight: 900;
            transition: var(--transition);
        }

        .has-submenu.open .arrow {
            transform: rotate(180deg);
            color: var(--neon-aqua);
        }

        /* --- SUBMENU STYLE --- */
        .submenu {
            list-style: none;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.3);
            margin: 2px 5px 0 25px;
            border-left: 2px solid var(--neon-aqua);
            border-radius: 0 0 10px 10px;
        }

        .has-submenu.open .submenu {
            max-height: 250px;
            padding: 8px 0;
        }

        .submenu-item a {
            text-decoration: none;
            color: #a0aec0;
            display: block;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 700; /* Font Tebal pada Sub-menu */
            letter-spacing: 1px;
            transition: var(--transition);
            text-transform: uppercase;
        }

        .submenu-item a:hover, .submenu-item a.active-sub {
            color: var(--neon-aqua);
            padding-left: 28px;
            background: rgba(0, 251, 255, 0.05);
        }

        /* --- CONTENT AREA --- */
        .content-area {
            flex-grow: 1;
            height: 100vh;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer-tag {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #4a5568;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="header-title">
            <div class="dashboard-text">
                DASHBOARD<br>POSTINGAN UP
            </div>
        </div>

        <ul class="menu-container">
            <!-- Menu Utama -->
            <li class="menu-item">
                <a href="prediksi.html" onclick="changePage('prediksi.html', this)" target="mainFrame" class="menu-link">
                    <span class="icon">🔥</span> PREDIKSI UP
                </a>
            </li>

            <!-- Menu POSTINGAN dengan Dropdown (Syair & Kemenangan) -->
            <li class="menu-item has-submenu">
                <div class="menu-link" onclick="toggleSubmenu(this)">
                    <span class="icon">📁</span> POSTINGAN <span class="arrow">▼</span>
                </div>
                <ul class="submenu">
                    <li class="submenu-item">
                        <a href="syair.html" target="mainFrame" onclick="setActiveSub(this)">📜 SYAIR</a>
                    </li>
                    <li class="submenu-item">
                        <a href="kemenangan.html" target="mainFrame" onclick="setActiveSub(this)">💰 KEMENANGAN</a>
                    </li>
                </ul>
            </li>

            <!-- Menu LAYANAN VIP dengan Dropdown -->
            <li class="menu-item has-submenu">
                <div class="menu-link" onclick="toggleSubmenu(this)">
                    <span class="icon">💎</span> LAYANAN VIP <span class="arrow">▼</span>
                </div>
                <ul class="submenu">
                    <li class="submenu-item">
                        <a href="sc-vip.html" target="mainFrame" onclick="setActiveSub(this)">📊 SC VIP</a>
                    </li>
                    <li class="submenu-item">
                        <a href="report_vip.html" target="mainFrame" onclick="setActiveSub(this)">📈 REPORT VIP</a>
                    </li>
                </ul>
            </li>

            <!-- Menu Peminjaman -->
            <li class="menu-item">
                <a href="sc_peminjaman.html" onclick="changePage('sc_peminjaman.html', this)" target="mainFrame" class="menu-link">
                    <span class="icon">📑</span> SC PEMINJAMAN
                </a>
            </li>
        </ul>

        <div class="footer-tag">OFFICIAL MANAGEMENT</div>
    </nav>

    <main class="content-area">
        <iframe id="mainFrame" src="prediksi.html" name="mainFrame"></iframe>
    </main>

    <script>
        // Fungsi Dropdown
        function toggleSubmenu(element) {
            const parent = element.parentElement;
            parent.classList.toggle('open');
        }

        // Fungsi Link Menu Utama
        function changePage(pageUrl, element) {
            localStorage.setItem('lastOpenedPage', pageUrl);
            updateActiveState(element);
            
            // Tutup dropdown lain jika klik menu utama
            document.querySelectorAll('.has-submenu').forEach(item => {
                item.classList.remove('open');
            });
        }

        // Fungsi Link Sub-menu
        function setActiveSub(element) {
            const pageUrl = element.getAttribute('href');
            localStorage.setItem('lastOpenedPage', pageUrl);
            updateActiveState(element);
        }

        // Update Status Aktif (CSS)
        function updateActiveState(element) {
            document.querySelectorAll('.menu-link, .submenu-item a').forEach(el => {
                el.classList.remove('active', 'active-sub');
            });

            if (element.classList.contains('menu-link')) {
                element.classList.add('active');
            } else {
                element.classList.add('active-sub');
                // Sorot bapaknya juga kalau anaknya aktif
                element.closest('.has-submenu').querySelector('.menu-link').classList.add('active');
            }
        }

        // Memory halaman terakhir saat refresh
        window.onload = function() {
            const lastPage = localStorage.getItem('lastOpenedPage');
            const iframe = document.getElementById('mainFrame');
            const allLinks = document.querySelectorAll('.menu-link, .submenu-item a');

            if (lastPage) {
                iframe.src = lastPage;
                allLinks.forEach(link => {
                    if (link.getAttribute('href') === lastPage) {
                        updateActiveState(link);
                        const parentSub = link.closest('.has-submenu');
                        if(parentSub) parentSub.classList.add('open');
                    }
                });
            } else {
                document.querySelector('.menu-link').classList.add('active');
            }
        };
    </script>

</body>
</html>
