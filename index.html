<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard WUKONG </title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/pDQOisi.png">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #000c14;
            --sidebar-bg: #00121a;
            --neon-aqua: #00fbff;
            --neon-glow: rgba(0, 251, 255, 0.5);
            --glass-white: rgba(255, 255, 255, 0.05);
            --glass-hover: rgba(0, 251, 255, 0.15);
            --text-main: #e0e6ed;
            --text-dim: #a0aec0;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(0, 251, 255, 0.2);
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 10px 0 35px rgba(0, 0, 0, 0.9);
        }

        .header-title {
            width: 100%;
            padding: 45px 20px 20px 20px;
            text-align: center;
        }

        .dashboard-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--neon-aqua);
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1.4;
            text-shadow: 0 0 15px var(--neon-glow);
            border-bottom: 2px solid var(--neon-glow);
            padding-bottom: 12px;
            display: inline-block;
        }

        /* Style Jam Real-Time */
        .realtime-clock {
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* --- MENU CONTAINER --- */
        .menu-container {
            list-style: none;
            padding: 10px 15px;
            margin-top: 5px;
            overflow-y: auto;
            flex-grow: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-aqua) transparent;
        }

        .menu-container::-webkit-scrollbar {
            width: 5px;
        }
        .menu-container::-webkit-scrollbar-thumb {
            background: var(--neon-aqua);
            border-radius: 10px;
        }

        .menu-item {
            margin-bottom: 12px;
            position: relative;
        }

        .menu-link {
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            background: var(--glass-white);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition);
            cursor: pointer;
            user-select: none;
        }

        .menu-link:hover {
            color: #fff;
            background: var(--glass-hover);
            border-color: var(--neon-aqua);
            transform: translateX(10px);
            box-shadow: 0 0 25px rgba(0, 251, 255, 0.2);
        }

        .menu-link.active {
            color: #fff;
            background: rgba(0, 251, 255, 0.15);
            border-color: var(--neon-aqua);
            text-shadow: 0 0 10px var(--neon-aqua);
            box-shadow: inset 0 0 15px rgba(0, 251, 255, 0.1);
        }

        .menu-link .icon {
            margin-right: 15px;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 5px var(--neon-glow));
        }

        .arrow {
            margin-left: auto;
            font-size: 12px;
            font-weight: 900;
            transition: var(--transition);
            opacity: 0.7;
        }

        .has-submenu.open .arrow {
            transform: rotate(180deg);
            color: var(--neon-aqua);
            opacity: 1;
        }

        .submenu {
            list-style: none;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.4);
            margin: 4px 5px 0 25px;
            border-left: 2px solid var(--neon-aqua);
            border-radius: 0 0 12px 12px;
        }

        .has-submenu.open .submenu {
            max-height: 800px;
            padding: 10px 0;
        }

        .submenu-item a {
            text-decoration: none;
            color: var(--text-dim);
            display: block;
            padding: 12px 25px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: var(--transition);
            text-transform: uppercase;
        }

        .submenu-item a:hover, .submenu-item a.active-sub {
            color: var(--neon-aqua);
            padding-left: 35px;
            background: rgba(0, 251, 255, 0.08);
            text-shadow: 0 0 8px var(--neon-glow);
        }

        /* --- CONTENT AREA --- */
        .content-area {
            flex-grow: 1;
            height: 100vh;
            background: #000;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: relative;
            z-index: 1;
        }

        .footer-tag {
            padding: 25px;
            text-align: center;
            font-size: 13px;
            color: #4a5568;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 800;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(0, 0, 0, 0.2);
        }

        /* Style Neon Blue untuk Nama Wukong */
        .neon-blue {
            color: var(--neon-aqua);
            text-shadow: 0 0 8px var(--neon-glow), 0 0 15px var(--neon-glow);
            font-weight: 900;
        }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="header-title">
            <div class="dashboard-text">
                DASHBOARD<br>WUKONG
            </div>
            <!-- TEMPAT JAM REAL-TIME -->
            <div id="clock" class="realtime-clock">Memuat Waktu...</div>
        </div>

        <ul class="menu-container">
            <li class="menu-item">
                <a href="prediksi.html" onclick="changePage('prediksi.html', this)" target="mainFrame" class="menu-link">
                    <span class="icon">🔥</span> PREDIKSI UP
                </a>
            </li>

            <li class="menu-item has-submenu">
                <div class="menu-link" onclick="toggleSubmenu(this)">
                    <span class="icon">📁</span> POSTINGAN <span class="arrow">▼</span>
                </div>
                <ul class="submenu">
                    <li class="submenu-item"><a href="katakata.html" target="mainFrame" onclick="setActiveSub(this)">💬 KATA KATA</a></li>
                    <li class="submenu-item"><a href="syair.html" target="mainFrame" onclick="setActiveSub(this)">📜 SYAIR</a></li>
                    <li class="submenu-item"><a href="kemenangan.html" target="mainFrame" onclick="setActiveSub(this)">💰 KEMENANGAN</a></li>
                    <li class="submenu-item"><a href="reportan_slot.html" target="mainFrame" onclick="setActiveSub(this)">🎰 REPORTAN SLOT</a></li>
                </ul>
            </li>

            <li class="menu-item has-submenu">
                <div class="menu-link" onclick="toggleSubmenu(this)">
                    <span class="icon">💎</span> VIP & USDT <span class="arrow">▼</span>
                </div>
                <ul class="submenu">
                    <li class="submenu-item"><a href="sc-vip.html" target="mainFrame" onclick="setActiveSub(this)">📊 SC VIP</a></li>
                    <li class="submenu-item"><a href="report_vip.html" target="mainFrame" onclick="setActiveSub(this)">📈 REPORT VIP</a></li>
                    <li class="submenu-item"><a href="pencairan_vip.html" target="mainFrame" onclick="setActiveSub(this)">💵 CAIR VIP</a></li>
                    <li class="submenu-item"><a href="sc_selisih_vip.html" target="mainFrame" onclick="setActiveSub(this)">📑 SC SELISIH VIP</a></li>
                    <li class="submenu-item"><a href="rate_usdt.html" target="mainFrame" onclick="setActiveSub(this)">💲 RATE USDT</a></li>
                </ul>
            </li>

            <li class="menu-item">
                <a href="sc_peminjaman.html" onclick="changePage('sc_peminjaman.html', this)" target="mainFrame" class="menu-link">
                    <span class="icon">📑</span> SC PEMINJAMAN
                </a>
            </li>
        </ul>

        <!-- FOOTER YANG DIUBAH -->
        <div class="footer-tag">Created by <span class="neon-blue">Wukong</span></div>
    </nav>

    <main class="content-area">
        <iframe id="mainFrame" src="prediksi.html" name="mainFrame"></iframe>
    </main>

    <script>
        // FUNGSI JAM REAL-TIME (Bahasa Indonesia)
        function updateClock() {
            const now = new Date();
            const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

            const dayName = days[now.getDay()];
            const date = now.getDate();
            const monthName = months[now.getMonth()];
            const year = now.getFullYear();
            
            // Tambahkan Nol jika angka satuan
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const timeString = `${dayName}, ${date} ${monthName} ${year}<br>${hours}:${minutes}:${seconds}`;
            document.getElementById('clock').innerHTML = timeString;
        }

        setInterval(updateClock, 1000);
        updateClock(); // Jalankan langsung saat load

        // Fungsi Dropdown
        function toggleSubmenu(element) {
            const parent = element.parentElement;
            parent.classList.toggle('open');
        }

        // Fungsi Link Menu Utama
        function changePage(pageUrl, element) {
            localStorage.setItem('lastOpenedPage', pageUrl);
            updateActiveState(element);
            document.querySelectorAll('.has-submenu').forEach(item => {
                item.classList.remove('open');
            });
        }

        // Fungsi Link Sub-menu
        function setActiveSub(element) {
            const pageUrl = element.getAttribute('href');
            localStorage.setItem('lastOpenedPage', pageUrl);
            updateActiveState(element);
        }

        function updateActiveState(element) {
            document.querySelectorAll('.menu-link, .submenu-item a').forEach(el => {
                el.classList.remove('active', 'active-sub');
            });

            if (element.classList.contains('menu-link')) {
                element.classList.add('active');
            } else {
                element.classList.add('active-sub');
                const parentLink = element.closest('.has-submenu').querySelector('.menu-link');
                if(parentLink) parentLink.classList.add('active');
            }
        }

        window.onload = function() {
            const lastPage = localStorage.getItem('lastOpenedPage');
            const iframe = document.getElementById('mainFrame');
            const allLinks = document.querySelectorAll('.menu-link, .submenu-item a');

            if (lastPage) {
                iframe.src = lastPage;
                allLinks.forEach(link => {
                    if (link.getAttribute('href') === lastPage) {
                        updateActiveState(link);
                        const parentSub = link.closest('.has-submenu');
                        if(parentSub) parentSub.classList.add('open');
                    }
                });
            } else {
                const firstLink = document.querySelector('.menu-link');
                if(firstLink) firstLink.classList.add('active');
            }
        };
    </script>

</body>
</html>
