<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PENCAIRAN VIP - Reverse Order Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #010a0f;
            --card-bg: rgba(2, 20, 30, 0.95);
            --neon-cyan: #00fbff;
            --neon-glow: rgba(0, 251, 255, 0.6);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 251, 255, 0.05) 0%, transparent 80%);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* --- BINGKAI LUAR KEDAP KEDIP --- */
        .dashboard-card {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 3px solid var(--neon-cyan);
            border-radius: 30px;
            padding: 40px;
            animation: cyanBlink 2s infinite alternate;
            box-shadow: 0 0 30px rgba(0, 0, 0, 1);
        }

        @keyframes cyanBlink {
            0% { border-color: rgba(0, 251, 255, 0.2); box-shadow: 0 0 10px rgba(0, 251, 255, 0.1); }
            100% { border-color: var(--neon-cyan); box-shadow: 0 0 40px var(--neon-glow); }
        }

        /* --- JUDUL MELAMBAI --- */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--neon-cyan);
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--neon-glow);
            display: inline-block;
            animation: waving 3s ease-in-out infinite;
        }

        @keyframes waving {
            0%, 100% { transform: rotate(-2deg) translateY(0); }
            50% { transform: rotate(2deg) translateY(-10px); }
        }

        .inner-box {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 251, 255, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: var(--neon-cyan);
            margin-bottom: 15px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0, 20, 30, 0.8);
            border: 2px solid rgba(0, 251, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 15px;
            outline: none;
            resize: none;
        }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
            margin-bottom: 10px;
        }

        .btn-gen { background: var(--neon-cyan); color: #000; }
        .btn-gen:hover { transform: translateY(-3px); box-shadow: 0 0 30px var(--neon-cyan); }
        .btn-reset { background: transparent; color: #ff3232; border: 1px solid #ff3232; font-size: 10px; padding: 10px; }

        /* --- TERMINAL OUTPUT --- */
        .terminal {
            margin-top: 25px;
            background: #000;
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            padding: 25px;
            max-height: 400px;
            overflow-y: auto;
        }

        #resultOutput {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            font-size: 20px;
            font-weight: 900;
            line-height: 1.6;
            text-align: left;
            white-space: pre;
        }

        .copy-btn {
            width: 100%;
            margin-top: 20px;
            background: rgba(0, 251, 255, 0.1);
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            padding: 15px;
            font-weight: 900;
        }

        .copy-btn:hover { background: var(--neon-cyan); color: #000; }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--neon-cyan); color: #000; padding: 12px 40px;
            border-radius: 50px; font-weight: 900; display: none; z-index: 999;
        }

        /* Scrollbar */
        .terminal::-webkit-scrollbar { width: 5px; }
        .terminal::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="header">
            <h1>PENCAIRAN VIP</h1>
        </div>

        <div class="inner-box">
            <label>📥 TEMPEL LOG TRANSAKSI</label>
            <textarea id="rawInput" placeholder="Tempel seluruh log transaksi di sini..."></textarea>
        </div>

        <button class="btn-gen" onclick="processData()">GENERATE REVERSE NOMINAL</button>
        <button class="btn-reset" onclick="location.reload()">RESET SYSTEM</button>

        <!-- OUTPUT LIST NOMINAL -->
        <div class="terminal" id="terminalBox" style="display: none;">
            <label style="font-size: 10px; opacity: 0.7;">REVERSE ORDER READY (LAST TO FIRST):</label>
            <div id="resultOutput"></div>
            <button class="copy-btn" onclick="copyText()">SALIN REVERSE LIST</button>
        </div>
    </div>

    <div id="toast">SYSTEM: DATA DISALIN (URUTAN TERBALIK)!</div>

    <script>
        function processData() {
            const input = document.getElementById('rawInput').value;
            const lines = input.split('\n');
            
            let feeList = [];

            lines.forEach((line) => {
                // Ambil nominal fee (bukan fee persen)
                if (line.includes("Fee :") && !line.includes("Persen")) {
                    let parts = line.split(":");
                    if (parts.length > 1) {
                        let valStr = parts[1].trim();
                        let numericVal = parseFloat(valStr.replace(/,/g, ''));
                        
                        if (!isNaN(numericVal)) {
                            // Pembulatan ke atas
                            let rounded = Math.ceil(numericVal);
                            // Masukkan ke array
                            feeList.push(rounded.toLocaleString('en-US'));
                        }
                    }
                }
            });

            if (feeList.length > 0) {
                // FUNGSI PEMBALIK URUTAN (REVERSE)
                // Data yang masuk pertama (paling atas di log) akan jadi paling bawah
                feeList.reverse();

                document.getElementById('resultOutput').innerText = feeList.join('\n');
                document.getElementById('terminalBox').style.display = 'block';
            } else {
                alert("SISTEM ERROR: Data 'Fee :' nominal tidak ditemukan!");
            }
        }

        function copyText() {
            const text = document.getElementById('resultOutput').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById("toast");
                toast.style.display = "block";
                setTimeout(() => { toast.style.display = "none"; }, 2500);
            });
        }
    </script>
</body>
</html>
