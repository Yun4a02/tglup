<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PENCAIRAN VIP </title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0f0f0f; /* Abu-abu Gelap */
            --card-bg: #1a1a1a;
            --neon-gold: #d4af37; /* Emas Metallic */
            --gold-glow: rgba(212, 175, 55, 0.6);
            --neon-red: #ff3c00;
            --red-glow: rgba(255, 60, 0, 0.5);
            --transition: all 0.3s ease;
        }

        /* --- CORE RESET & ANTI-LAG --- */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-weight: 900 !important; 
            -webkit-font-smoothing: antialiased;
            transform: translateZ(0); 
        }

        body {
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at 50% 50%, #1e1e1e 0%, #0f0f0f 100%);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BINGKAI LUAR KEDAP KEDIP GOLD --- */
        .dashboard-card {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 3px solid var(--neon-gold);
            border-radius: 30px;
            padding: 40px;
            animation: goldBlink 2s infinite alternate;
            box-shadow: 0 0 30px rgba(0, 0, 0, 1);
        }

        @keyframes goldBlink {
            0% { border-color: rgba(212, 175, 55, 0.2); box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); }
            100% { border-color: var(--neon-gold); box-shadow: 0 0 40px var(--gold-glow); }
        }

        /* --- LETTER BY LETTER FLICKER TITLE --- */
        @keyframes charFlicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% {
                opacity: 1; text-shadow: 0 0 10px var(--gold-glow), 0 0 20px var(--neon-gold);
            }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% {
                opacity: 0.4; text-shadow: none;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            color: var(--neon-gold);
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .header h1 span {
            display: inline-block;
            animation: charFlicker 5s infinite;
        }

        /* Delay acak untuk efek kedap-kedip per huruf (PENCAIRAN VIP) */
        .header h1 span:nth-child(1) { animation-delay: 0.1s; }
        .header h1 span:nth-child(2) { animation-delay: 0.5s; }
        .header h1 span:nth-child(3) { animation-delay: 1.2s; }
        .header h1 span:nth-child(4) { animation-delay: 0.8s; }
        .header h1 span:nth-child(5) { animation-delay: 2.1s; }
        .header h1 span:nth-child(6) { animation-delay: 0.3s; }
        .header h1 span:nth-child(7) { animation-delay: 1.5s; }
        .header h1 span:nth-child(8) { animation-delay: 0.7s; }
        .header h1 span:nth-child(9) { animation-delay: 1.1s; }
        .header h1 span:nth-child(11) { animation-delay: 1.4s; }
        .header h1 span:nth-child(12) { animation-delay: 0.6s; }
        .header h1 span:nth-child(13) { animation-delay: 2.5s; }

        .inner-box {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-gold);
            margin-bottom: 15px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 5px var(--gold-glow);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #000;
            border: 2px solid #333;
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            outline: none;
            resize: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--neon-gold);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
            margin-bottom: 10px;
        }

        .btn-gen { 
            background: var(--neon-gold); 
            color: #000; 
            box-shadow: 0 0 20px var(--gold-glow);
        }
        .btn-gen:hover { transform: translateY(-3px); box-shadow: 0 0 30px var(--neon-gold); filter: brightness(1.2); }
        
        .btn-reset { 
            background: transparent; 
            color: var(--neon-red); 
            border: 1px solid var(--neon-red); 
            font-size: 10px; 
            padding: 10px; 
        }
        .btn-reset:hover { background: var(--neon-red); color: #fff; }

        /* --- TERMINAL OUTPUT --- */
        .terminal {
            margin-top: 25px;
            background: #000;
            border: 2px solid var(--neon-gold);
            border-radius: 20px;
            padding: 25px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.1);
        }

        #resultOutput {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-gold);
            font-size: 22px;
            line-height: 1.6;
            text-align: left;
            white-space: pre;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .copy-btn {
            width: 100%;
            margin-top: 20px;
            background: rgba(212, 175, 55, 0.1);
            color: var(--neon-gold);
            border: 2px solid var(--neon-gold);
            padding: 15px;
        }

        .copy-btn:hover { background: var(--neon-gold); color: #000; }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--neon-gold); color: #000; padding: 15px 40px;
            border-radius: 50px; display: none; z-index: 999;
            box-shadow: 0 0 30px var(--gold-glow);
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-gold); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="header">
            <h1>
                <span>P</span><span>E</span><span>N</span><span>C</span><span>A</span><span>I</span><span>R</span><span>A</span><span>N</span>
                &nbsp;
                <span>V</span><span>I</span><span>P</span>
            </h1>
        </div>

        <div class="inner-box">
            <label>📥 TEMPEL LOG TRANSAKSI</label>
            <textarea id="rawInput" placeholder="Tempel seluruh log transaksi di sini..."></textarea>
        </div>

        <button class="btn-gen" onclick="processData()">GENERATE REVERSE NOMINAL</button>
        <button class="btn-reset" onclick="location.reload()">RESET SYSTEM</button>

        <!-- OUTPUT LIST NOMINAL -->
        <div class="terminal" id="terminalBox" style="display: none;">
            <label style="font-size: 10px; opacity: 0.7;">REVERSE ORDER READY (LAST TO FIRST):</label>
            <div id="resultOutput"></div>
            <button class="copy-btn" onclick="copyText()">SALIN REVERSE LIST</button>
        </div>
    </div>

    <div id="toast">SYSTEM: DATA DISALIN (URUTAN TERBALIK)!</div>

    <script>
        function processData() {
            const input = document.getElementById('rawInput').value;
            const lines = input.split('\n');
            
            let feeList = [];

            lines.forEach((line) => {
                if (line.includes("Fee :") && !line.includes("Persen")) {
                    let parts = line.split(":");
                    if (parts.length > 1) {
                        let valStr = parts[1].trim();
                        let numericVal = parseFloat(valStr.replace(/,/g, ''));
                        
                        if (!isNaN(numericVal)) {
                            let rounded = Math.ceil(numericVal);
                            feeList.push(rounded.toLocaleString('en-US'));
                        }
                    }
                }
            });

            if (feeList.length > 0) {
                feeList.reverse();
                document.getElementById('resultOutput').innerText = feeList.join('\n');
                document.getElementById('terminalBox').style.display = 'block';
            } else {
                alert("SISTEM ERROR: Data 'Fee :' nominal tidak ditemukan!");
            }
        }

        function copyText() {
            const text = document.getElementById('resultOutput').innerText;
            const elem = document.createElement('textarea');
            elem.value = text;
            document.body.appendChild(elem);
            elem.select();
            document.execCommand('copy');
            document.body.removeChild(elem);
            
            const toast = document.getElementById("toast");
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 2500);
        }
    </script>
</body>
</html>
