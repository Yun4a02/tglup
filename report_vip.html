<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORT VIP - Under Development</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #000c14;
            --neon-aqua: #00fbff;
            --glass-white: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Latar Belakang Partikel Animasi Ringan */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0, 251, 255, 0.05) 0%, transparent 70%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            background: var(--glass-white);
            border: 1px solid rgba(0, 251, 255, 0.2);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }

        /* Ikon Animasi Gear */
        .icon-box {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            letter-spacing: 4px;
            color: var(--neon-aqua);
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 251, 255, 0.6);
            text-transform: uppercase;
        }

        p {
            font-size: 18px;
            color: #b0c4de;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
        }

        /* PROGRESS BAR SIMULASI */
        .progress-wrapper {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 251, 255, 0.1);
        }

        .progress-bar {
            width: 65%; /* Persentase simulasi */
            height: 100%;
            background: linear-gradient(90deg, #00fbff, #0081ff);
            box-shadow: 0 0 15px var(--neon-aqua);
            border-radius: 20px;
            animation: pulse 2s infinite;
        }

        .status-text {
            font-size: 12px;
            color: var(--neon-aqua);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Dekorasi Sudut */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-aqua);
        }
        .top-left { top: -2px; left: -2px; border-right: none; border-bottom: none; border-radius: 15px 0 0 0; }
        .bottom-right { bottom: -2px; right: -2px; border-left: none; border-top: none; border-radius: 0 0 15px 0; }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <!-- Dekorasi -->
        <div class="corner top-left"></div>
        <div class="corner bottom-right"></div>

        <div class="icon-box">⚙️</div>
        
        <h1>REPORT VIP</h1>
        <p>SEDANG TAHAP PENGEMBANGAN</p>

        <div class="progress-wrapper">
            <div class="progress-bar"></div>
        </div>
        
        <div class="status-text">System Optimization 65%</div>

        <div style="margin-top: 30px; font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 2px;">
            ESTIMASI SELESAI: MARET 2026
        </div>
    </div>

</body>
</html>
