<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP DATA SCANNER </title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* THEME GOLDEN LUXURY */
            --bg-main: #0a0a0a;
            --gold-primary: #d4af37;
            --gold-light: #f9e29c;
            --gold-dark: #aa8439;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --gold-dim: rgba(212, 175, 55, 0.2);
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Custom Scrollbar Golden */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-primary); }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%), 
                              linear-gradient(rgba(212, 175, 55, 0.05) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 100%, 100% 4px;
            color: #d1d9e0;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 880px; }

        .header-section { text-align: center; margin-bottom: 20px; }
        
        /* JUDUL DENGAN NEON FLICKER */
        .glitch-title {
            font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 900;
            color: var(--gold-primary); text-transform: uppercase; letter-spacing: 8px;
            display: inline-block;
        }

        .flicker-char {
            display: inline-block;
            animation: neonFlicker 3s linear infinite;
        }

        @keyframes neonFlicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% {
                opacity: 1;
                text-shadow: 0 0 10px var(--gold-primary), 0 0 20px var(--gold-dark);
            }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% {
                opacity: 0.3;
                text-shadow: none;
            }
        }

        .scanner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        .neon-panel {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--gold-dim);
            border-radius: 12px;
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .neon-panel:hover {
            border-color: var(--gold-primary);
            box-shadow: 0 0 25px var(--gold-glow);
        }

        .scan-line {
            display: none; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 3px;
            background: var(--gold-primary); 
            box-shadow: 0 0 15px 1px var(--gold-primary), 0 0 5px #fff;
            z-index: 10; 
            animation: scanMove 1.5s linear infinite;
            pointer-events: none;
        }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }

        .panel-header {
            background: rgba(212, 175, 55, 0.1);
            padding: 8px;
            text-align: center;
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--gold-light);
            border-bottom: 1px solid var(--gold-dim);
            text-shadow: 0 0 8px var(--gold-dark);
        }

        textarea { 
            width: 100%; height: 160px; background: transparent; 
            border: none; padding: 12px; color: #fff; 
            font-family: 'Courier New', monospace; font-size: 11px;
            resize: none; outline: none;
        }

        .btn-container { display: flex; gap: 12px; margin-bottom: 20px; }
        
        .btn-action, .btn-reset {
            padding: 12px; background: transparent; font-family: 'Orbitron'; 
            font-size: 13px; font-weight: 900; letter-spacing: 3px; 
            cursor: pointer; transition: var(--transition); text-transform: uppercase; 
            border-radius: 8px;
        }

        .btn-action { flex: 3; border: 2px solid var(--gold-dim); color: var(--gold-primary); }
        .btn-action:hover { background: var(--gold-primary); color: #000; box-shadow: 0 0 30px var(--gold-glow); }

        .btn-reset { flex: 1; border: 2px solid rgba(255, 49, 49, 0.4); color: var(--neon-red); }
        .btn-reset:hover { background: var(--neon-red); color: #fff; box-shadow: 0 0 30px rgba(255, 49, 49, 0.3); }

        #statusBar {
            display: none; text-align: center; font-family: 'Orbitron'; font-size: 10px;
            color: var(--gold-primary); margin-bottom: 15px; letter-spacing: 2px; animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .report-card { 
            display: none; padding: 20px; border-radius: 20px; 
            border: 2px solid var(--gold-dim); background: rgba(0,0,0,0.95);
            margin-bottom: 20px;
        }

        .report-label { text-align: center; color: var(--gold-light); font-family: 'Orbitron'; font-weight: 900; font-size: 11px; letter-spacing: 3px; margin-bottom: 5px; }
        
        .user-id-badge { 
            font-size: 36px; font-weight: 900; color: #fff; text-align: center; 
            margin-bottom: 20px; text-shadow: 0 0 15px var(--gold-glow); 
            font-style: italic; letter-spacing: 2px; 
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { 
            padding: 15px; text-align: center; font-style: italic; border-radius: 12px;
            background: rgba(255,255,255,0.02); border: 2px solid var(--gold-dim);
        }
        .stat-title { font-size: 9px; font-weight: 900; color: var(--gold-primary); letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
        .stat-value { font-family: 'Orbitron'; font-size: 22px; font-weight: 900; color: #fff; }
        .stat-sub { font-size: 12px; color: #ffffff !important; font-weight: 900; margin-top: 8px; text-transform: uppercase; }

        .verdict-board { padding: 25px; border-radius: 15px; text-align: center; font-style: italic; border: 3px solid; }
        .verdict-msg { font-size: 18px; font-weight: 900; margin-bottom: 10px; letter-spacing: 3px; text-transform: uppercase; }
        .verdict-diff { font-family: 'Orbitron'; font-size: 50px; font-weight: 900; }

        .st-aman { color: var(--neon-green); border-color: rgba(57, 255, 20, 0.4) !important; }
        .st-selisih { color: var(--neon-red); border-color: rgba(255, 49, 49, 0.4) !important; }

        .footer {
            text-align: center; margin-top: 10px; font-family: 'Orbitron'; font-size: 10px;
            letter-spacing: 4px; color: #666; text-transform: uppercase; padding-bottom: 20px;
        }
        .footer span { color: var(--gold-primary); font-weight: 900; }
    </style>
</head>
<body>

    <div class="container">
        <header class="header-section">
            <h1 class="glitch-title" id="main-title">SC SELISIH VIP</h1>
        </header>

        <section class="scanner-grid">
            <div class="neon-panel" id="panelVip">
                <div class="scan-line"></div>
                <div class="panel-header">DATA QRIS VIP</div>
                <textarea id="inpVip" placeholder="PASTE VIP LOG..."></textarea>
            </div>
            <div class="neon-panel" id="panelIdn">
                <div class="scan-line"></div>
                <div class="panel-header">DATA IDN HISTORY</div>
                <textarea id="inpIdn" placeholder="PASTE HISTORY LOG..."></textarea>
            </div>
        </section>

        <div class="btn-container">
            <button class="btn-action" id="mainBtn" onclick="startJarvis()">RUN SYSTEM ANALYSIS</button>
            <button class="btn-reset" onclick="resetAll()">RESET</button>
        </div>

        <div id="statusBar">ANALYZING LOG DATA... ACCESSING ENCRYPTED FILES</div>

        <div id="reportCard" class="report-card">
            <div class="report-label">ENCRYPTED REPORT FOR</div>
            <div id="resUserId" class="user-id-badge">-</div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">TOTAL VIP BALANCE</div>
                    <div id="resTotalVip" class="stat-value">0</div>
                    <div id="resCountVip" class="stat-sub">0 TRANSACTIONS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">TOTAL IDN BALANCE</div>
                    <div id="resTotalIdn" class="stat-value">0</div>
                    <div id="resCountIdn" class="stat-sub">0 TRANSACTIONS</div>
                </div>
            </div>

            <div id="verdictBox" class="verdict-board">
                <div id="statusMsg" class="verdict-msg">-</div>
                <div id="resDiff" class="verdict-diff">(0)</div>
            </div>
        </div>

        <div class="footer">Official System Security • Created by <span>Wukong</span></div>
    </div>

    <script>
        // FUNGSI NEON FLICKER PER HURUF
        function applyNeonFlicker(elementId) {
            const el = document.getElementById(elementId);
            const text = el.innerText;
            el.innerHTML = '';
            text.split('').forEach(char => {
                const span = document.createElement('span');
                if (char === ' ') {
                    span.innerHTML = '&nbsp;';
                } else {
                    span.innerText = char;
                }
                span.className = 'flicker-char';
                span.style.animationDelay = (Math.random() * 5) + 's';
                el.appendChild(span);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            applyNeonFlicker('main-title');
        });

        // --- ALGORITMA SCANNER TETAP SAMA (TIDAK BERUBAH) ---
        const formatKoma = (n) => n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");

        function resetAll() {
            if(confirm("Reset seluruh data sistem?")) {
                location.reload();
            }
        }

        function startJarvis() {
            const v = document.getElementById('inpVip').value;
            const i = document.getElementById('inpIdn').value;
            if (!v.trim() || !i.trim()) { alert("ERROR: Mohon masukkan kedua data log."); return; }

            document.getElementById('reportCard').style.display = 'none';
            document.getElementById('statusBar').style.display = 'block';
            document.querySelectorAll('.scan-line').forEach(el => el.style.display = 'block');
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('mainBtn').innerText = "SCANNING...";

            setTimeout(() => {
                processData(v, i);
                document.getElementById('statusBar').style.display = 'none';
                document.querySelectorAll('.scan-line').forEach(el => el.style.display = 'none');
                document.getElementById('mainBtn').disabled = false;
                document.getElementById('mainBtn').innerText = "RUN SYSTEM ANALYSIS";
            }, 1500);
        }

        function processData(rawV, rawI) {
            const card = document.getElementById('reportCard');
            let user = "UNKNOWN", tV = 0, cV = 0, tI = 0, cI = 0;

            const userMatch = rawV.match(/DYNAMIC\s+\S+\s+([a-zA-Z0-9_]+)/i);
            if (userMatch) {
                user = userMatch[1].toUpperCase();
            }

            const vipRegex = /Total\s*:\s*([\d,]+)/gi;
            let vMatch;
            while ((vMatch = vipRegex.exec(rawV)) !== null) {
                const val = parseInt(vMatch[1].replace(/,/g, ''));
                if (!isNaN(val)) {
                    tV += val;
                    cV++;
                }
            }

            const idnLines = rawI.split('\n');
            idnLines.forEach(line => {
                if (line.toLowerCase().includes('deposit')) {
                    const moneyMatch = line.match(/\d{1,3}(,\d{3})+/);
                    if (moneyMatch) {
                        tI += parseInt(moneyMatch[0].replace(/,/g, ''));
                        cI++;
                    }
                }
            });

            document.getElementById('resUserId').innerText = user;
            document.getElementById('resTotalVip').innerText = formatKoma(tV);
            document.getElementById('resCountVip').innerText = cV + " TRANSACTIONS";
            document.getElementById('resTotalIdn').innerText = formatKoma(tI);
            document.getElementById('resCountIdn').innerText = cI + " TRANSACTIONS";

            const diff = tV - tI;
            const msg = document.getElementById('statusMsg');
            const res = document.getElementById('resDiff');
            const box = document.getElementById('verdictBox');
            
            box.className = "verdict-board";
            card.style.display = "block";

            if (diff === 0 && tV > 0) {
                msg.innerText = "DATA SYSTEM STATUS: SECURE";
                res.innerText = "AMAN";
                box.classList.add('st-aman');
            } else {
                msg.innerText = "SELISIH !!!!!";
                res.innerText = "(" + formatKoma(Math.abs(diff)) + ")";
                box.classList.add('st-selisih');
            }
        }
    </script>
</body>
</html>
