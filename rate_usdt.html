<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional USDT Rate Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #01080b;
            --card-bg: rgba(2, 15, 20, 0.95);
            --neon-cyan: #00fbff;
            --neon-glow: rgba(0, 251, 255, 0.6);
            --text-main: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 251, 255, 0.03) 0%, transparent 80%);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .dashboard-card {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 3px solid var(--neon-cyan);
            border-radius: 30px;
            padding: 45px;
            position: relative;
            animation: cyanBlink 2.5s infinite alternate;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        @keyframes cyanBlink {
            0% { border-color: rgba(0, 251, 255, 0.2); box-shadow: 0 0 10px rgba(0, 251, 255, 0.1); }
            100% { border-color: var(--neon-cyan); box-shadow: 0 0 40px var(--neon-glow); }
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            letter-spacing: 8px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            animation: floatingTitle 4s ease-in-out infinite;
        }

        @keyframes floatingTitle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .inner-section {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(0, 251, 255, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 900;
            color: var(--neon-cyan);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        /* UKURAN TEXTAREA DIKECILKAN SEDIKIT (160px) */
        textarea#rawInput {
            height: 160px; 
            font-size: 16px;
            line-height: 1.6;
        }

        textarea, input {
            width: 100%;
            background: rgba(0, 30, 40, 0.7);
            border: 2px solid rgba(0, 251, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            outline: none;
            transition: var(--transition);
        }

        textarea:focus, input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-glow);
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

        /* --- CONTAINER SCAN --- */
        .scan-container { position: relative; overflow: hidden; border-radius: 12px; }
        
        .scan-line {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--neon-cyan);
            box-shadow: 0 0 25px var(--neon-cyan);
            z-index: 10;
        }

        /* TEKS SCANNING WUKONG */
        .scan-text-overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px var(--neon-cyan);
            z-index: 11;
            letter-spacing: 5px;
            white-space: nowrap;
            pointer-events: none;
        }

        .scanning .scan-line { display: block; animation: scanAction 1.2s linear infinite; }
        .scanning .scan-text-overlay { display: block; animation: blinkText 0.5s infinite alternate; }
        .scanning textarea { opacity: 0.3; } /* Gelapkan textarea saat scan */

        @keyframes scanAction { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes blinkText { from { opacity: 0.4; } to { opacity: 1; } }

        .btn-group { display: flex; gap: 20px; margin-bottom: 30px; }
        button {
            flex: 1; padding: 20px; border-radius: 15px; border: none;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            font-size: 15px;
            transition: var(--transition);
        }

        .btn-generate { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-glow); }
        .btn-generate:hover { transform: scale(1.02); box-shadow: 0 0 35px var(--neon-cyan); }
        .btn-reset { background: transparent; color: #ff4d4d; border: 2px solid #ff4d4d; }

        .footer-credit {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 3px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-glow), 0 0 20px var(--neon-glow);
            padding: 20px;
            border-top: 1px solid rgba(0, 251, 255, 0.1);
            text-transform: uppercase;
        }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--neon-cyan); color: #000; padding: 15px 40px;
            border-radius: 50px; font-weight: 900; display: none;
            box-shadow: 0 0 30px var(--neon-cyan); z-index: 1000;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="header">
            <h1>USDT RATE GENERATOR</h1>
        </div>

        <div class="inner-section">
            <label>📡 ANALYZE DATA CORE (PASTE RAW REPORT)</label>
            <div class="scan-container" id="scanWrapper">
                <div class="scan-line"></div>
                <!-- ANIMASI SCANNING TEXT -->
                <div class="scan-text-overlay">WUKONG SCANING...</div>
                <textarea id="rawInput" placeholder="PASTE DATA RAW REPORT DISINI UNTUK SCAN OTOMATIS..." oninput="autoFillData()"></textarea>
            </div>
        </div>

        <div class="inner-section">
            <div class="grid-2">
                <div class="input-box">
                    <label>RATIO DEPOSIT</label>
                    <input type="text" id="depoRatio" placeholder="16854">
                </div>
                <div class="input-box">
                    <label>RATIO WITHDRAW</label>
                    <input type="text" id="wdRatio" placeholder="17024">
                </div>
            </div>

            <div class="input-box" style="margin-bottom: 25px;">
                <label>TIMESTAMP UPDATE</label>
                <input type="text" id="manualTime">
            </div>

            <div class="grid-2">
                <div class="input-box">
                    <label>LAMPIRAN URL 1</label>
                    <input type="text" id="link1" placeholder="HTTPS://...">
                </div>
                <div class="input-box">
                    <label>LAMPIRAN URL 2</label>
                    <input type="text" id="link2" placeholder="HTTPS://...">
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-generate" onclick="generateAndCopy()">GENERATE & AUTO COPY</button>
            <button class="btn-reset" onclick="resetForm()">RESET SYSTEM</button>
        </div>

        <div class="footer-credit">
            Official System Security • Created by Wukong
        </div>
    </div>

    <div id="toast">SYSTEM: REPORT COPIED!</div>

    <script>
        function formatWithComma(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function autoFillData() {
            const rawText = document.getElementById('rawInput').value;
            const depoMatch = rawText.match(/Deposit\s*[:]\s*([\d,.]+)/i);
            const wdMatch = rawText.match(/Withdraw\s*[:]\s*([\d,.]+)/i);
            
            if (depoMatch) {
                document.getElementById('depoRatio').value = depoMatch[1].replace(/[,.]/g, '');
            }
            if (wdMatch) {
                document.getElementById('wdRatio').value = wdMatch[1].replace(/[,.]/g, '');
            }
        }

        window.onload = function() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('manualTime').value = (hours < 10 ? '0' + hours : hours) + ':' + minutes + ' ' + ampm;
        };

        function generateAndCopy() {
            const wrapper = document.getElementById('scanWrapper');
            const depoRaw = document.getElementById('depoRatio').value;
            const wdRaw = document.getElementById('wdRatio').value;

            if (!depoRaw || !wdRaw) { alert("ERROR: ISI DATA TERLEBIH DAHULU!"); return; }

            // Jalankan Animasi Scanning
            wrapper.classList.add('scanning');

            setTimeout(() => {
                const time = document.getElementById('manualTime').value;
                const l1 = document.getElementById('link1').value || '-';
                const l2 = document.getElementById('link2').value || '-';
                const d = new Date();
                const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
                const fullDate = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

                const finalDepo = formatWithComma(depoRaw.replace(/[,.]/g, ''));
                const finalWd = formatWithComma(wdRaw.replace(/[,.]/g, ''));

                const report = `RATE SEKARANG
Usdt Ratio Deposit : ${finalDepo}
Usdt Ratio Withdraw : ${finalWd}
UPDATE : ${fullDate} (${time})
Lampiran :
${l1}
${l2}`;

                navigator.clipboard.writeText(report).then(() => {
                    wrapper.classList.remove('scanning'); // Matikan animasi
                    const toast = document.getElementById("toast");
                    toast.style.display = "block";
                    setTimeout(() => { toast.style.display = "none"; }, 2000);
                });

            }, 1500); // Waktu scan sedikit lebih lama agar animasi terlihat keren
        }

        function resetForm() { location.reload(); }
    </script>
</body>
</html>
