<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Syair Pedoman V26 - Master Layout</title>
    <!-- Library High Definition Capture -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,700;1,700&family=Archivo+Black&family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #020617;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            color: #fff;
        }

        /* --- BINGKAI UTAMA --- */
        .outer-wrapper {
            position: relative;
            padding: 10px;
        }

        #frame-syair {
            width: 850px;
            height: 580px;
            background-color: #dcb693;
            background-image: url('https://files.catbox.moe/7tuydg.png'); 
            position: relative;
            
            border: 38px solid transparent;
            border-image-source: url('https://files.catbox.moe/7tuydg.png');
            border-image-slice: 180; 
            border-image-repeat: stretch;
            
            display: flex;
            flex-direction: column;
            color: #000;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        .inner-container {
            border: 2px solid #000;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        .header {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr;
            border-bottom: 2px solid #000;
            height: 75px;
            align-items: center;
        }
        .header-cell {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #000;
            padding: 0 15px;
        }
        .header-cell:last-child { border-right: none; }
        .logo-left-img { height: 50px; max-width: 100%; object-fit: contain; }
        .header-title { font-family: 'Archivo Black', sans-serif; font-size: 24px; text-align: center; text-transform: uppercase; }
        .logo-right-img { height: 45px; object-fit: contain; }

        /* --- BARIS INFO --- */
        .date-row {
            display: grid;
            grid-template-columns: 180px 1fr 200px;
            border-bottom: 2px solid #000;
            height: 55px;
        }
        .label-bb { border-right: 2px solid #000; font-size: 26px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .date-val { font-size: 22px; font-weight: 900; display: flex; align-items: center; justify-content: center; font-family: 'Times New Roman'; }
        
        .top-digits-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-left: 2px solid #000; }
        .top-digits-grid div { border-right: 2px solid #000; font-size: 38px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .top-digits-grid div:last-child { border-right: none; }

        /* --- MAIN GRID --- */
        .main-grid { display: grid; grid-template-columns: 180px 1fr 200px; flex-grow: 1; }
        
        .col-2d { border-right: 2px solid #000; display: flex; flex-direction: column; }
        .col-2d div { flex: 1; border-bottom: 2px solid #000; font-size: 55px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .col-2d div:last-child { border-bottom: none; }

        /* --- AREA TENGAH (KOMPAS & PUISI) --- */
        .col-center { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 5px 10px; 
            justify-content: space-around; 
            position: relative; 
        }

        /* PERBAIKAN: Tata letak angka Kompas mata angin agar tidak tertutup */
        .compass-box { 
            position: relative; 
            width: 130px; 
            height: 130px; 
            margin-top: 5px; 
        }
        .compass-img { 
            width: 100%; 
            height: 100%; 
            background: url('https://files.catbox.moe/igscbv.png') center/contain no-repeat; 
        }
        .c-val { 
            position: absolute; 
            font-size: 28px; 
            font-weight: 900; 
            font-family: 'Times New Roman'; 
            color: #000;
        }
        /* Penyesuaian koordinat angka agar rapi */
        .n { top: -15px; left: 50%; transform: translateX(-50%); }
        .s { bottom: -15px; left: 50%; transform: translateX(-50%); }
        .w { left: -22px; top: 50%; transform: translateY(-50%); }
        .e { right: -22px; top: 50%; transform: translateY(-50%); }

        .poem-box {
            width: 88%; 
            height: 130px;
            background: url('https://files.catbox.moe/1bzpyn.png') center/contain no-repeat;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 0 40px; 
            margin-bottom: 5px;
            margin-top: 10px;
        }
        .poem-text { 
            font-family: 'Crimson Text', serif; 
            font-size: 15px; 
            font-weight: 700; 
            font-style: italic; 
            text-align: center; 
            line-height: 1.3; 
        }

        /* Area BBFS & Shio */
        .col-right { border-left: 2px solid #000; display: flex; flex-direction: column; }
        .bbfs-area { display: grid; grid-template-columns: 1.8fr 1fr; border-bottom: 2px solid #000; height: 90px; overflow: hidden; }
        .bbfs-label { display: flex; align-items: center; justify-content: center; border-right: 2px solid #000; font-size: 24px; font-weight: 900; }
        .bbfs-digits { display: flex; flex-direction: column; flex: 1; }
        .digit-row { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 38px; font-weight: 900; }
        .digit-top { border-bottom: 2px solid #000; }

        .shio-display { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; }
        .shio-shield { width: 140px; height: 140px; background: url('https://files.catbox.moe/md15hn.png') center/contain no-repeat; display: flex; align-items: center; justify-content: center; }
        .shio-shield img { width: 75%; height: 75%; object-fit: contain; }
        .shio-sub-text { font-family: 'Archivo Black', sans-serif; font-size: 24px; margin-top: 5px; letter-spacing: 2px; }

        /* Footer */
        .footer-table { border-top: 2px solid #000; display: flex; flex-direction: column; }
        .foot-row-1 { display: grid; grid-template-columns: 180px 170px 220px 1fr; border-bottom: 2px solid #000; height: 42px; }
        .foot-cell { border-right: 2px solid #000; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; text-transform: uppercase; }
        .foot-row-2 { display: grid; grid-template-columns: 180px 170px 175px 1fr; height: 42px; }
        .foot-cell-2 { border-right: 2px solid #000; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; }
        .foot-cell:last-child, .foot-cell-2:last-child { border-right: none; }

        /* --- MODERN GENERATOR UI --- */
        .admin-panel {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            width: 850px;
            padding: 35px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            gap: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .admin-panel h2 { text-align: center; color: #38bdf8; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .input-box { display: flex; flex-direction: column; gap: 8px; }
        .input-box label { font-size: 13px; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
        input, textarea { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.2); padding: 15px; border-radius: 12px; color: #fff; font-size: 16px; outline: none; font-family: inherit; }
        input:focus, textarea:focus { border-color: #38bdf8; background: rgba(15, 23, 42, 0.9); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 18px; font-size: 16px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-generate { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; }
        .btn-save { background: linear-gradient(135deg, #059669, #10b981); color: white; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.15); }

    </style>
</head>
<body>

    <!-- Area Preview Gambar -->
    <div class="outer-wrapper">
        <div id="frame-syair">
            <div class="inner-container">
                <!-- Header -->
                <div class="header">
                    <div class="header-cell"><img id="view-logo-market" class="logo-left-img" src="https://files.catbox.moe/lv1l77.png"></div>
                    <div class="header-cell"><div class="header-title">SYAIR PEDOMAN</div></div>
                    <div class="header-cell"><img class="logo-right-img" src="https://files.catbox.moe/70x8f3.png"></div>
                </div>

                <!-- Info Baris 2 -->
                <div class="date-row">
                    <div class="label-bb">BB 2D</div>
                    <div class="date-val" id="view-date">MINGGU, 22 / 2 / 2026</div>
                    <div class="top-digits-grid">
                        <div id="vt-1">8</div><div id="vt-2">5</div><div id="vt-3">1</div>
                    </div>
                </div>

                <!-- Main Grid -->
                <div class="main-grid">
                    <div class="col-2d">
                        <div id="v2d-1">92</div><div id="v2d-2">74</div><div id="v2d-3">49</div><div id="v2d-4">47</div>
                    </div>

                    <!-- Area Kompas yang telah diperbaiki -->
                    <div class="col-center">
                        <div class="compass-box">
                            <div class="compass-img"></div>
                            <div class="c-val n" id="vc-n">0</div>
                            <div class="c-val w" id="vc-w">3</div>
                            <div class="c-val e" id="vc-e">1</div>
                            <div class="c-val s" id="vc-s">5</div>
                        </div>
                        <div class="poem-box">
                            <div class="poem-text" id="view-poem">
                                Anjing berdiri menjaga setia,<br>Tak mundur walau bahaya menjelma.
                            </div>
                        </div>
                    </div>

                    <div class="col-right">
                        <div class="bbfs-area">
                            <div class="bbfs-label">BBFS</div>
                            <div class="bbfs-digits">
                                <div id="v-bbfs-4" class="digit-row digit-top">5</div>
                                <div id="v-bbfs-5" class="digit-row">6</div>
                            </div>
                        </div>
                        <div class="shio-display">
                            <div class="shio-shield"><img id="view-shio-img" src=""></div>
                            <div class="shio-sub-text">SHIO</div>
                        </div>
                    </div>
                </div>

                <!-- Footer Table -->
                <div class="footer-table">
                    <div class="foot-row-1">
                        <div class="foot-cell">SHIO</div><div id="view-shio-name" class="foot-cell">ANJING</div>
                        <div class="foot-cell">COLOK BEBAS</div><div id="view-colok" class="foot-cell">7,3</div>
                    </div>
                    <div class="foot-row-2">
                        <div class="foot-cell-2" style="font-size: 18px; letter-spacing: 1px;">TOP 4D :</div>
                        <div id="v4d-1" class="foot-cell-2">2212</div><div id="v4d-2" class="foot-cell-2">9350</div><div id="v4d-3" class="foot-cell-2">9280</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Generator Panel -->
    <div class="admin-panel">
        <h2>GENERATOR SYAIR</h2>
        
        <div class="input-box">
            <label>Update Tanggal & Hari</label>
            <input type="text" id="in-date" value="MINGGU, 22 / 2 / 2026" oninput="syncNow()">
        </div>

        <div class="input-box">
            <label>Update Kalimat Syair</label>
            <textarea id="in-poem" rows="3" oninput="syncNow()">Anjing berdiri menjaga setia,
Tak mundur walau bahaya menjelma.</textarea>
        </div>

        <div class="btn-group">
            <button class="btn btn-generate" onclick="generateAll()">Acak Angka & Logo</button>
            <button class="btn btn-save" onclick="saveJPG()">Save Img</button>
        </div>
    </div>

    <script>
        const logos = ["https://files.catbox.moe/lv1l77.png","https://files.catbox.moe/vjwq6t.png","https://files.catbox.moe/bhv2em.png","https://files.catbox.moe/07c6tw.png","https://files.catbox.moe/xk5e6i.png"];
        const shios = [
            { name: "ANJING", img: "https://files.catbox.moe/gqquw4.png" }, { name: "TIKUS", img: "https://files.catbox.moe/tfiwp1.png" },
            { name: "KERBAU", img: "https://files.catbox.moe/ders0q.png" }, { name: "HARIMAU", img: "https://files.catbox.moe/wtq3xf.png" },
            { name: "KELINCI", img: "https://files.catbox.moe/35jaus.png" }, { name: "NAGA", img: "https://files.catbox.moe/amhpxz.png" },
            { name: "ULAR", img: "https://files.catbox.moe/lba60l.png" }, { name: "KUDA", img: "https://files.catbox.moe/jgpbzq.png" },
            { name: "KAMBING", img: "https://files.catbox.moe/ijuvjj.png" }, { name: "MONYET", img: "https://files.catbox.moe/z6zawf.png" },
            { name: "AYAM", img: "https://files.catbox.moe/8166tk.png" }, { name: "BABI", img: "https://files.catbox.moe/f53wi1.png" }
        ];

        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function syncNow() {
            document.getElementById('view-date').innerText = document.getElementById('in-date').value;
            document.getElementById('view-poem').innerHTML = document.getElementById('in-poem').value.replace(/\n/g, '<br>');
        }

        function generateAll() {
            document.getElementById('view-logo-market').src = logos[Math.floor(Math.random() * logos.length)];
            for(let i=1; i<=3; i++) document.getElementById('vt-'+i).innerText = rand(0, 9);
            for(let i=1; i<=4; i++) document.getElementById('v2d-'+i).innerText = rand(10, 99);
            document.getElementById('vc-n').innerText = rand(0, 9);
            document.getElementById('vc-w').innerText = rand(0, 9);
            document.getElementById('vc-e').innerText = rand(0, 9);
            document.getElementById('vc-s').innerText = rand(0, 9);
            document.getElementById('v-bbfs-4').innerText = rand(0, 9);
            document.getElementById('v-bbfs-5').innerText = rand(0, 9);
            const s = shios[Math.floor(Math.random() * shios.length)];
            document.getElementById('view-shio-img').src = s.img;
            document.getElementById('view-shio-name').innerText = s.name;
            document.getElementById('view-colok').innerText = rand(0,9) + "," + rand(0,9);
            document.getElementById('v4d-1').innerText = rand(1000, 9999);
            document.getElementById('v4d-2').innerText = rand(1000, 9999);
            document.getElementById('v4d-3').innerText = rand(1000, 9999);
            syncNow();
        }

        function saveJPG() {
            const frame = document.getElementById('frame-syair');
            html2canvas(frame, { scale: 2, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Syair_Pedoman_Final.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            });
        }
        window.onload = generateAll;
    </script>
</body>
</html>
