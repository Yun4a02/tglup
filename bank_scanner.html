<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALIDASI BANK DANA - WUKONG</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212; 
            --card-bg: rgba(20, 20, 20, 0.98);
            --luxury-gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.6);
            --border-ui: rgba(212, 175, 55, 0.2);
            --neon-red: #ff3131;
            --red-glow: rgba(255, 49, 49, 0.6);
            --neon-green: #00ff88;
            --dana-blue: #00d9ff;
            --blue-glow: rgba(0, 217, 255, 0.6);
        }

        /* --- CUSTOM SCROLLBAR --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb {
            background: var(--luxury-gold);
            border-radius: 10px;
            border: 2px solid #0a0a0a;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #fff;
            box-shadow: 0 0 15px var(--gold-glow);
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; font-weight: 900 !important; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 2px 2px, rgba(212, 175, 55, 0.05) 1px, transparent 0);
            background-size: 30px 30px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            padding: 60px 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 10px var(--gold-glow), 0 0 20px var(--luxury-gold); color: var(--luxury-gold); }
            20%, 22%, 24%, 55% { text-shadow: none; color: #333; }
        }

        @keyframes flickerBlue {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 10px var(--blue-glow), 0 0 20px var(--dana-blue); color: var(--dana-blue); }
            20%, 22%, 24%, 55% { text-shadow: none; color: #003344; }
        }

        .title-wrapper { text-align: center; margin-bottom: 40px; }
        .flicker-title {
            font-family: 'Orbitron';
            font-size: 32px;
            letter-spacing: 8px;
            text-transform: uppercase;
            display: inline-block;
            animation: flicker 4s infinite;
        }
        .dana-text { color: var(--dana-blue); animation: flickerBlue 4s infinite !important; }

        .scanner-main {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border-ui);
            border-top: 4px solid var(--luxury-gold);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .input-wrapper { display: flex; flex-direction: column; position: relative; }

        /* Counter Badge Putih - Highly Visible */
        .char-counter {
            position: absolute; top: 8px; right: 15px;
            background: #fff; color: #000;
            font-family: 'Orbitron'; font-size: 14px;
            padding: 4px 10px; border-radius: 6px;
            z-index: 5; box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .label-pro {
            font-family: 'Orbitron'; color: var(--luxury-gold);
            font-size: 12px; text-align: center;
            background: rgba(212, 175, 55, 0.08);
            padding: 10px; border: 1px solid var(--border-ui);
            border-radius: 12px 12px 0 0;
        }

        textarea {
            width: 100%; height: 100px; background: #000;
            border: 1px solid var(--border-ui); border-top: 2px solid var(--luxury-gold);
            border-radius: 0 0 12px 12px; padding: 20px;
            color: #fff; font-family: 'Orbitron'; font-size: 18px;
            outline: none; resize: none; transition: 0.3s;
            text-transform: uppercase; text-align: center;
        }
        textarea:focus { border-color: var(--luxury-gold); box-shadow: 0 0 15px var(--gold-glow); }

        .btn-container { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-pro { flex: 1; padding: 18px; font-family: 'Orbitron'; font-size: 15px; border-radius: 12px; cursor: pointer; text-transform: uppercase; transition: 0.3s; border: none; }
        
        .btn-scan { background: var(--luxury-gold); color: black; box-shadow: 0 0 15px var(--gold-glow); }
        .btn-scan:hover { background: white; transform: scale(1.02); }

        .btn-reset { background: var(--neon-red); color: white; box-shadow: 0 0 15px var(--red-glow); }
        .btn-reset:hover { background: white; color: var(--neon-red); box-shadow: 0 0 25px white; }

        /* --- RESULT DASHBOARD --- */
        #resultHUD { display: none; animation: fadeIn 0.5s ease; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #000; border: 2px solid #333; padding: 25px; border-radius: 15px; text-align: center; }
        .stat-card .val { display: block; font-family: 'Orbitron'; font-size: 45px; color: var(--luxury-gold); text-shadow: 0 0 15px var(--gold-glow); }
        .stat-card .lbl { font-size: 12px; color: #bbb; text-transform: uppercase; letter-spacing: 2px; }

        .status-banner { padding: 20px; border-radius: 12px; text-align: center; font-family: 'Orbitron'; font-size: 22px; margin-bottom: 20px; letter-spacing: 2px; }
        .safe { background: rgba(0, 255, 136, 0.1); color: var(--neon-green); border: 2px solid var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .warn { background: rgba(255, 49, 49, 0.1); color: var(--neon-red); border: 2px solid var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="title-wrapper">
        <h1 class="flicker-title">VALIDASI BANK <span class="dana-text">DANA</span></h1>
    </div>

    <div class="scanner-main">
        <div class="input-grid">
            <div class="input-wrapper">
                <div class="char-counter" id="idnCountBadge">0</div>
                <div class="label-pro">DATA IDN (ACUAN)</div>
                <textarea id="idnText" placeholder="MASUKKAN NAMA IDN" oninput="updateCounter()"></textarea>
            </div>
            <div class="input-wrapper">
                <div class="char-counter" id="bankCountBadge">0</div>
                <div class="label-pro">DATA BANK (INPUT)</div>
                <textarea id="bankText" placeholder="MASUKKAN NAMA BANK" oninput="updateCounter()"></textarea>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-pro btn-scan" onclick="runCountScan()">RUN VALIDATION SCAN</button>
            <button class="btn-pro btn-reset" onclick="resetApp()">RESET ALL</button>
        </div>

        <!-- HASIL HANYA BERDASARKAN JUMLAH -->
        <div id="resultHUD">
            <div class="stat-grid">
                <div class="stat-card">
                    <span class="val" id="statIdn">0</span>
                    <span class="lbl">TOTAL HURUF IDN</span>
                </div>
                <div class="stat-card">
                    <span class="val" id="statBank">0</span>
                    <span class="lbl">TOTAL HURUF BANK</span>
                </div>
            </div>

            <div id="statusBanner" class="status-banner"></div>
        </div>
    </div>

    <script>
        // Hitung Huruf secara Real-time saat mengetik
        function updateCounter() {
            // Kita menghapus spasi dari hitungan agar hanya karakter/huruf yang dihitung
            const idn = document.getElementById('idnText').value.replace(/\s/g, '').length; 
            const bank = document.getElementById('bankText').value.replace(/\s/g, '').length;
            
            document.getElementById('idnCountBadge').innerText = idn;
            document.getElementById('bankCountBadge').innerText = bank;
        }

        function runCountScan() {
            const idnText = document.getElementById('idnText').value.replace(/\s/g, '');
            const bankText = document.getElementById('bankText').value.replace(/\s/g, '');
            
            const countIdn = idnText.length;
            const countBank = bankText.length;

            const hud = document.getElementById('resultHUD');
            const banner = document.getElementById('statusBanner');

            if (countIdn === 0 && countBank === 0) {
                alert("SILAHKAN INPUT DATA TERLEBIH DAHULU!");
                return;
            }

            // Tampilkan HUD
            hud.style.display = 'block';
            document.getElementById('statIdn').innerText = countIdn;
            document.getElementById('statBank').innerText = countBank;

            // Algoritma: Hanya membandingkan jumlah (Length)
            if (countIdn === countBank) {
                banner.className = "status-banner safe";
                banner.innerText = "✅ STATUS: AMAN (JUMLAH HURUF SINKRON)";
            } else {
                banner.className = "status-banner warn";
                if (countBank > countIdn) {
                    banner.innerText = `⚠️ TIDAK SINKRON (LEBIH ${countBank - countIdn} HURUF PADA BANK)`;
                } else {
                    banner.innerText = `⚠️ TIDAK SINKRON (KURANG ${countIdn - countBank} HURUF PADA BANK)`;
                }
            }
        }

        function resetApp() {
            document.getElementById('idnText').value = "";
            document.getElementById('bankText').value = "";
            document.getElementById('resultHUD').style.display = 'none';
            updateCounter();
        }
    </script>
</body>
</html>
